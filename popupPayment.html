<!DOCTYPE html>
<html>
<head>
	  <base target="_top">
	  <meta name="viewport" content="width=device-width, initial-scale=1">
	  <link rel="preconnect" href="https://fonts.googleapis.com">
	  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
	  <style>
	    * {
	      margin: 0;
	      padding: 0;
	      box-sizing: border-box;
	    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      margin: 0;
      padding: 10px 0 0 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Base commune de catégories : popupPayment reste autonome,
       mais il adopte la même grille de types que les autres popups
       pour faciliter les futures évolutions sans changer son flux. */
    .container[class*="popup-type-"] .popup-view.active {
      width: 100%;
      align-self: center;
      margin: 0;
      padding: 0;
    }

    .popup-type-alert .popup-view.active {
      max-width: 360px;
    }

    .popup-type-confirm .popup-view.active {
      max-width: 380px;
    }

    .popup-type-form-simple .popup-view.active {
      max-width: 440px;
    }

    .popup-type-form-complex .popup-view.active {
      max-width: 520px;
    }

    .popup-type-action .popup-view.active {
      max-width: 420px;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
    }

	    .popup-view.active {
	      display: flex;
	    }

	    .form-view {
	      padding: 20px 0 0 0;
	    }

    .error-view {
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

	    .list-container {
	      flex: 1;
	      overflow-y: auto;
	      padding-right: 4px;
	      padding-bottom: 78px;
	    }

		    .invoice-item {
		      display: flex;
		      align-items: center;
		      gap: 10px;
		      padding: 10px 0;
		      border-bottom: 1px solid #eeeeee;
		      font-size: calc(13pt + 2px);
		      font-weight: 600;
		      color: #000;
		    }

	    .invoice-item input[type="checkbox"] {
	      width: 18px;
	      height: 18px;
	      cursor: pointer;
	      accent-color: #00983a;
	    }

	    .invoice-item input[type="checkbox"]:checked + span {
	      font-weight: 700;
	    }

	    .message-title {
	      font-size: 16pt;
	      font-weight: bold;
	      margin-bottom: 10px;
	    }

    .message-sub {
      font-size: 13pt;
      line-height: 1.4;
    }

		    .footer {
		      position: fixed;
		      left: 0;
		      right: 0;
		      bottom: 0;
		      width: 100%;
		      height: 78px;
		      display: flex;
		      justify-content: flex-end;
		      align-items: stretch;
		      padding: 24px 0 4px 0;
		      background: #fff;
		      z-index: 10;
		    }

	    .footer .btn {
	      width: 100%;
	      height: 50px;
	      min-height: 50px;
	      margin-left: 0;
	    }

	    .btn {
	      margin-left: 20px;
	      min-height: 52px;
	      padding: 0 48px;
	      border-radius: 7px;
      cursor: pointer;
      border: none;
      font-size: 23px;
      line-height: 1;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-green {
      background-color: #00983a;
      color: white;
      border: 1px solid #00983a;
    }

    .btn-green:hover:enabled {
      background-color: #1ecc00;
      border: 1px solid #1ecc00;
    }

    .btn-green:disabled,
    .btn-green[disabled],
    .btn-green.disabled,
    .btn:disabled.btn-green,
    .btn[disabled].btn-green,
    .btn.btn-green.disabled {
      background-color: #efefef;
      border: 1px solid #efefef;
      color: #ffffff;
      cursor: not-allowed;
    }

    .btn-cancel {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #d4d4d4;
    }

    .btn-cancel:hover {
      background-color: #ffffff;
      border: 1px solid #000000;
    }
  </style>
</head>
	<body>
	  <div id="popupContainer" class="container">
	    <div id="formView" class="popup-view form-view active">
	      <div class="list-container">
	        <? for (let i = 0; i < invoices.length; i++) { ?>
	          <label class="invoice-item">
	            <input type="checkbox" name="invoiceNumber" value="<?= invoices[i].invoiceNumber ?>" onchange="updateSubmitState()">
	            <span>Facture #<?= invoices[i].invoiceNumber ?></span>
	          </label>
	        <? } ?>
	      </div>

	      <div class="footer">
	        <button id="submit" class="btn btn-green" onclick="submitForm()" disabled>Enregistrer</button>
	      </div>
	    </div>

    <div id="errorView" class="popup-view error-view">
      <div class="message-title" id="errorTitle">Attention</div>
      <div class="message-sub" id="errorMessage"></div>
      <div class="footer">
        <button class="btn btn-cancel" onclick="google.script.host.close()">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    let isSubmitting = false;
    const popupTypeClasses = [
      "popup-type-alert",
      "popup-type-confirm",
      "popup-type-form-simple",
      "popup-type-form-complex",
      "popup-type-action"
    ];
    const popupTypeByView = {
      formView: "form-simple",
      errorView: "alert"
    };

    /* Même fallback que sur les autres popups :
       si aucun type n'est explicitement imposé, on utilise le type prévu
       pour la vue courante afin d'harmoniser l'ensemble sans casser le flux. */
    function applyPopupType(type) {
      const popupContainer = document.getElementById("popupContainer");
      popupTypeClasses.forEach(className => {
        popupContainer.classList.remove(className);
      });

      if (typeof type !== "string" || type.trim() === "") {
        return;
      }

      const normalizedType = `popup-type-${type.trim()}`;
      if (popupTypeClasses.includes(normalizedType)) {
        popupContainer.classList.add(normalizedType);
      }
    }

    function resolvePopupType(viewId, type) {
      if (typeof type === "string" && type.trim() !== "") {
        return type.trim();
      }
      return popupTypeByView[viewId] || "";
    }

    function setActiveView(viewId, type) {
      ["formView", "errorView"].forEach(id => {
        document.getElementById(id).classList.toggle("active", id === viewId);
      });
      applyPopupType(resolvePopupType(viewId, type));
    }

    function updateSubmitState() {
      const hasSelection = Array.from(document.querySelectorAll('input[name="invoiceNumber"]:checked')).length > 0;
      document.getElementById("submit").disabled = !hasSelection || isSubmitting;
    }

    function showError(message) {
      document.getElementById("errorTitle").textContent = "Attention";
      document.getElementById("errorMessage").textContent = message || "Une erreur est survenue.";
      setActiveView("errorView", "alert");
    }

    function submitForm() {
      if (isSubmitting) return;

      const selectedInvoiceNumbers = Array.from(document.querySelectorAll('input[name="invoiceNumber"]:checked'))
        .map(input => input.value);
      if (selectedInvoiceNumbers.length === 0) {
        updateSubmitState();
        return;
      }

      isSubmitting = true;
      updateSubmitState();

      google.script.run
        .withSuccessHandler(() => {
          google.script.host.close();
        })
        .withFailureHandler(error => {
          isSubmitting = false;
          showError(error && error.message ? error.message : "Une erreur est survenue.");
        })
        .registerInvoicePayments(selectedInvoiceNumbers);
    }

    document.addEventListener("DOMContentLoaded", () => {
      setActiveView("formView", "form-simple");
      updateSubmitState();
    });
  </script>
</body>
</html>
