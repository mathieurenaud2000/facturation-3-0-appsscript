<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      margin: 0;
      padding: 10px 0 0 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Base commune de typage des popups.
       Ces classes vivent en parallèle de la structure actuelle pour préparer
       une standardisation progressive, sans imposer une migration immédiate. */
    .container[class*="popup-type-"] .popup-view.active {
      width: 100%;
      align-self: center;
      margin: 0;
      padding: 0;
    }

    /* alert = petit popup d'information ou d'erreur simple */
    .popup-type-alert .popup-view.active {
      max-width: 360px;
    }

    /* confirm = confirmation courte avec peu de contenu */
    .popup-type-confirm .popup-view.active {
      max-width: 380px;
    }

    /* form-simple = formulaire court à faible densité */
    .popup-type-form-simple .popup-view.active {
      max-width: 420px;
    }

    /* form-complex = formulaire plus riche, prévu pour des vues plus denses */
    .popup-type-form-complex .popup-view.active {
      max-width: 520px;
    }

    /* action = états de succès, téléchargement, envoi ou actions guidées */
    .popup-type-action .popup-view.active {
      max-width: 440px;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .form-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
      gap: 15px;
    }

    .invoice-number-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
      gap: 15px;
    }

    .confirm-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .message-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .status-view {
      flex-direction: column;
      justify-content: flex-start;
      padding: 60px 0 0 0;
    }

    .error-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .popup-view.active {
      display: flex;
    }

    select, input {
      width: 100%;
      margin: 0;
      padding: 10px;
      border: 1px solid #000000;
      border-radius: 7px;
      font-size: calc(13pt + 2px);
      color: #000;
      background: #fff;
    }

    select:disabled, input:disabled {
      border: 1px solid #f7f7f7;
      color: #9a9a9a;
      background: #f7f7f7;
    }

    input::placeholder {
      color: #c8c8c8;
      opacity: 1;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 42px;
      color: #000000;
      background-image:
        linear-gradient(45deg, transparent 50%, #000000 50%),
        linear-gradient(135deg, #000000 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% + 1px),
        calc(100% - 14px) calc(50% + 1px);
      background-size: 10px 10px, 10px 10px;
      background-repeat: no-repeat;
    }

    select.is-placeholder {
      color: #c8c8c8;
    }

    select option {
      color: #000000;
    }

    select option[value=""] {
      color: #c8c8c8;
    }

    select.invalid, input.invalid {
      border: 1px solid #ff0000;
    }

    .inline-field {
      display: flex;
      align-items: stretch;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      margin-top: 0;
    }

    .inline-field input {
      flex: 1;
      min-height: 52px;
    }

    .icon-btn {
      width: 52px;
      min-width: 52px;
      height: 52px;
      min-height: 52px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      line-height: 1;
    }

    .icon-btn:hover {
      background: transparent;
    }

    .icon-btn .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding-bottom: 0;
      padding-right: 0;
    }

    .btn {
      margin-right: 0;
      margin-left: 20px;
      min-height: 52px;
      padding: 0 25px;
      border-radius: 7px;
      cursor: pointer;
      border: none;
      font-size: 23px;
      line-height: 1;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .footer .btn:first-child {
      margin-left: 0;
    }

    .btn-green {
      background-color: #00983a;
      color: white;
      border: 1px solid #00983a;
    }

    .btn-green:hover {
      background-color: #1ecc00;
      border: 1px solid #1ecc00;
    }

    .btn-white {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #d4d4d4;
    }

    .btn-white:hover {
      background-color: #ffffff;
      border: 1px solid #000000;
    }

    .btn-green:disabled,
    .btn-green[disabled],
    .btn-green.disabled,
    .btn:disabled.btn-green,
    .btn[disabled].btn-green,
    .btn.btn-green.disabled {
      background-color: #efefef;
      border: 1px solid #efefef;
      color: #ffffff;
      cursor: not-allowed;
    }

    .loading-spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #4CAF50;
      border-radius: 50%;
      width: 90px;
      height: 90px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .message-sub {
      font-size: 14pt;
      text-align: center;
      white-space: pre-line;
    }

    .success-icon {
      color: #4CAF50;
      font-size: 90px;
      margin-bottom: 15px;
    }

    .message {
      font-size: 14pt;
      text-align: center;
      margin-bottom: 20px;
    }

    .inline-error {
      width: 100%;
      color: #b00020;
      font-size: 11pt;
      text-align: left;
      margin-top: 10px;
      display: none;
    }

    .inline-error.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="popupContainer" class="container">
    <!-- Vue numéro initial -->
    <div id="invoiceNumberView" class="popup-view invoice-number-view">
      <div class="message-title">Numéro de facture</div>
      <div class="message-sub">Par quel numéro de facture doit-on commencer?</div>
      <input type="number" id="initialNumber" inputmode="numeric" min="1" step="1" placeholder="Numéro de facture" oninput="validateInitialInvoiceNumber()">
      <div id="invoiceNumberError" class="inline-error" aria-live="polite"></div>
    </div>
    <!-- Vue confirmation -->
    <div id="confirmView" class="popup-view confirm-view">
      <div class="message-title" id="confirmTitle"></div>
      <div class="message-sub" id="confirmMessage"></div>
    </div>
    <!-- Vue message -->
    <div id="messageView" class="popup-view message-view">
      <div class="message-title" id="messageViewTitle"></div>
      <div class="message-sub" id="messageViewMessage"></div>
    </div>
    <!-- Formulaire initial -->
    <div id="formView" class="popup-view form-view active">
      <select id="contact" onchange="validateForm()">
        <option value="">Contact</option>
        <option>Autre</option>
      </select>
      <div id="newContactWrapper" class="inline-field" style="display:none;">
        <input type="text" id="newContact" placeholder="Entrez un nouveau contact" oninput="validateForm()">
        <button type="button" class="icon-btn" onclick="closeOtherField('contact', 'newContact', 'newContactWrapper')"><span class="material-symbols-outlined">close</span></button>
      </div>
      <select id="activityType" onchange="validateForm()">
        <option value="">Type d’activité générale</option>
        <option>Autre</option>
      </select>
      <div id="newActivityTypeWrapper" class="inline-field" style="display:none;">
        <input type="text" id="newActivityType" placeholder="Entrez une nouvelle activité" oninput="validateForm()">
        <button type="button" class="icon-btn" onclick="closeOtherField('activityType', 'newActivityType', 'newActivityTypeWrapper')"><span class="material-symbols-outlined">close</span></button>
      </div>
    </div>
    <!-- État de chargement -->
    <div id="loadingView" class="popup-view status-view">
      <div class="loading-spinner"></div>
      <div class="message-title" id="loadingTitle">Création de la facture</div>
      <div class="message-sub" id="loadingMessage">Veuillez patienter...</div>
    </div>
    <!-- État de succès -->
    <div id="successView" class="popup-view status-view">
      <i class="fas fa-check-circle success-icon"></i>
      <div class="message-title" id="successTitle">Bravo</div>
      <div class="message" id="successMessage">La facture a été enregistrée avec succès.</div>
    </div>
    <!-- État d'envoi -->
    <div id="sendInvoiceView" class="popup-view form-view">
      <div class="message-title">Envoyer la facture à</div>
      <select id="emailRecipient" onchange="validateSendInvoiceForm()"></select>
      <select id="emailCc" onchange="validateSendInvoiceForm()"></select>
    </div>
    <!-- État d'erreur -->
    <div id="errorView" class="popup-view error-view">
      <div class="message" id="errorMessage"></div>
    </div>
    <!-- Pied de page -->
    <div class="footer">
      <button id="submit" class="btn btn-green" disabled onclick="handlePrimaryAction()">Générer la facture</button>
      <button id="close" class="btn btn-white" style="display:none;" onclick="handleSecondaryAction()">Fermer</button>
      <button id="openPdf" class="btn btn-green" style="display:none;" onclick="handleOpenPdfAction()">Télécharger</button>
    </div>
  </div>

  <script>
    let pdfUrl = '';
    let currentInvoiceNumber = '';
    let currentInvoiceRecipientOptions = [];
    let currentPrimaryAction = null;
    let currentSecondaryAction = null;
    let currentOpenPdfAction = null;
    let pendingInvoiceSubmission = null;
    let emailSendCompleted = false;
    let formValidationActivated = false;
    let invoiceNumberValidationActivated = false;
    /* Le moteur supporte désormais une notion de type logique.
       Elle est ajoutée en parallèle des vues existantes pour préparer
       les futures migrations UI sans casser les appels actuels. */
    const popupTypeClasses = [
      "popup-type-alert",
      "popup-type-confirm",
      "popup-type-form-simple",
      "popup-type-form-complex",
      "popup-type-action"
    ];
    /* Cette table classe les vues historiques dans les catégories communes.
       Elle sert de fallback automatique : les appels existants n'ont donc pas
       besoin d'être tous réécrits pour bénéficier du nouveau système. */
    const popupTypeByView = {
      invoiceNumberView: "form-simple",
      confirmView: "confirm",
      messageView: "alert",
      formView: "form-simple",
      loadingView: "action",
      successView: "action",
      sendInvoiceView: "form-simple",
      errorView: "alert"
    };
    const popupViewIds = ["invoiceNumberView", "confirmView", "messageView", "formView", "loadingView", "successView", "sendInvoiceView", "errorView"];
    if (typeof window.contacts === "undefined") {
      window.contacts = [];
    }
    if (typeof window.activityTypes === "undefined") {
      window.activityTypes = [];
    }
    if (typeof window.initialInvoiceNumber === "undefined") {
      window.initialInvoiceNumber = null;
    }
    if (typeof window.requiresInitialInvoiceSetup === "undefined") {
      window.requiresInitialInvoiceSetup = false;
    }
    if (typeof window.showStartupConfirm === "undefined") {
      window.showStartupConfirm = false;
    }
    if (typeof window.confirmViewTitle === "undefined") {
      window.confirmViewTitle = "";
    }
    if (typeof window.confirmViewMessage === "undefined") {
      window.confirmViewMessage = "";
    }
    if (typeof window.confirmAction === "undefined") {
      window.confirmAction = "";
    }
    if (typeof window.confirmPrimaryLabel === "undefined") {
      window.confirmPrimaryLabel = "";
    }
    if (typeof window.confirmSecondaryLabel === "undefined") {
      window.confirmSecondaryLabel = "";
    }
    if (typeof window.showStandaloneMessage === "undefined") {
      window.showStandaloneMessage = false;
    }
    if (typeof window.messageViewTitle === "undefined") {
      window.messageViewTitle = "";
    }
    if (typeof window.messageViewMessage === "undefined") {
      window.messageViewMessage = "";
    }

    function setActiveView(viewId) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle("active", id === viewId);
      });
    }

    function setFooterButtons(footer) {
      const normalizedFooter = Object.assign({
        primary: { label: "", visible: false },
        secondary: { label: "", visible: false },
        openPdf: { visible: false }
      }, footer || {});
      const primaryButton = document.getElementById("submit");
      const secondaryButton = document.getElementById("close");
      const openPdfButton = document.getElementById("openPdf");

      primaryButton.style.display = normalizedFooter.primary.visible ? "block" : "none";
      secondaryButton.style.display = normalizedFooter.secondary.visible ? "block" : "none";
      openPdfButton.style.display = normalizedFooter.openPdf.visible ? "block" : "none";

      if (typeof normalizedFooter.primary.label === "string" && normalizedFooter.primary.label !== "") {
        primaryButton.textContent = normalizedFooter.primary.label;
      }
      if (typeof normalizedFooter.secondary.label === "string" && normalizedFooter.secondary.label !== "") {
        secondaryButton.textContent = normalizedFooter.secondary.label;
      }
    }

    /* Applique une catégorie visuelle/logique au conteneur principal.
       Le fallback est volontairement neutre : si aucun type n'est fourni,
       ou si le type est inconnu, on retire les classes de type et on laisse
       la présentation historique fonctionner telle quelle. */
    function applyPopupType(type) {
      const popupContainer = document.getElementById("popupContainer");
      popupTypeClasses.forEach(className => {
        popupContainer.classList.remove(className);
      });

      if (typeof type !== "string" || type.trim() === "") {
        return;
      }

      const normalizedType = `popup-type-${type.trim()}`;
      if (popupTypeClasses.includes(normalizedType)) {
        popupContainer.classList.add(normalizedType);
      }
    }

    /* Résout le type final appliqué à une vue.
       Priorité :
       1. le type passé explicitement par le flux courant
       2. le fallback défini par vue pour préserver l'existant
       3. aucun type si rien n'est défini */
    function resolvePopupType(type, view) {
      if (typeof type === "string" && type.trim() !== "") {
        return type.trim();
      }
      return popupTypeByView[view] || "";
    }

    function renderRecipientSelectOptions(selectElement, options, placeholder, selectedValue, allowEmptySelection) {
      selectElement.innerHTML = "";

      const placeholderOption = document.createElement("option");
      placeholderOption.value = "";
      placeholderOption.text = placeholder;
      selectElement.appendChild(placeholderOption);

      options.forEach(option => {
        const optionElement = document.createElement("option");
        optionElement.value = option.email;
        optionElement.text = option.name || option.email;
        optionElement.dataset.name = option.name || "";
        selectElement.appendChild(optionElement);
      });

      if (allowEmptySelection) {
        selectElement.value = selectedValue || "";
      } else if (selectedValue && options.some(option => option.email === selectedValue)) {
        selectElement.value = selectedValue;
      } else if (options.length > 0) {
        selectElement.value = options[0].email;
      } else {
        selectElement.value = "";
      }

      updateSelectPlaceholderState(selectElement);
    }

    function updateSelectPlaceholderState(selectElement) {
      if (!selectElement) return;
      selectElement.classList.toggle("is-placeholder", selectElement.value === "");
    }

    function validateSendInvoiceForm() {
      const recipientSelect = document.getElementById("emailRecipient");
      const isValid = recipientSelect.value.trim() !== "";
      document.getElementById("submit").disabled = !isValid;
      return isValid;
    }

    function getSelectedRecipient(selectId) {
      const selectElement = document.getElementById(selectId);
      const selectedOption = selectElement.options[selectElement.selectedIndex];
      if (!selectedOption || selectedOption.value === "") {
        return null;
      }
      return {
        name: selectedOption.dataset.name || "",
        email: selectedOption.value
      };
    }

    function setPopupState({
      view,
      type,
      title,
      message,
      footer,
      primaryAction,
      secondaryAction,
      openPdfAction
    }) {
      if (view === "formView") {
        pdfUrl = "";
        currentInvoiceNumber = "";
        currentInvoiceRecipientOptions = [];
        pendingInvoiceSubmission = null;
        emailSendCompleted = false;
      }

      if (view === "confirmView") {
        document.getElementById("confirmTitle").textContent = title || "";
        document.getElementById("confirmMessage").textContent = message || "";
      } else if (view === "messageView") {
        const safeTitle = typeof title === "string" && title.trim() !== "" ? title : "Information";
        const safeMessage = typeof message === "string" && message.trim() !== ""
          ? message
          : "Une erreur est survenue.";
        document.getElementById("messageViewTitle").textContent = safeTitle;
        document.getElementById("messageViewMessage").textContent = safeMessage;
      } else if (view === "errorView") {
        const safeMessage = typeof message === "string" && message.trim() !== ""
          ? message
          : "Une erreur est survenue.";
        document.getElementById("errorMessage").textContent = safeMessage;
      }

      if (view !== "errorView") {
        document.getElementById("errorMessage").textContent = "";
      }

      setActiveView(view);
      applyPopupType(resolvePopupType(type, view));
      setFooterButtons(footer);
      document.getElementById("submit").disabled = !footer || !footer.primary || !footer.primary.visible;
      currentPrimaryAction = typeof primaryAction === "function" ? primaryAction : null;
      currentSecondaryAction = typeof secondaryAction === "function" ? secondaryAction : null;
      currentOpenPdfAction = typeof openPdfAction === "function" ? openPdfAction : null;
    }

    function handlePrimaryAction() {
      if (typeof currentPrimaryAction === "function") {
        currentPrimaryAction();
      }
    }

    function handleSecondaryAction() {
      if (typeof currentSecondaryAction === "function") {
        currentSecondaryAction();
      }
    }

    function handleOpenPdfAction() {
      if (typeof currentOpenPdfAction === "function") {
        currentOpenPdfAction();
      }
    }

    function showInvoiceNumberInlineError(message) {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = message;
      errorElement.classList.add("active");
    }

    function clearInvoiceNumberInlineError() {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = "";
      errorElement.classList.remove("active");
    }

    function clearFormValidationState() {
      ["contact", "newContact", "activityType", "newActivityType", "initialNumber"].forEach(id => {
        const field = document.getElementById(id);
        if (field) {
          field.classList.remove("invalid");
        }
      });
      clearInvoiceNumberInlineError();
    }

    function validateInitialInvoiceNumber(activateValidation = false) {
      if (activateValidation) {
        invoiceNumberValidationActivated = true;
      }
      const initialNumberInput = document.getElementById("initialNumber");
      const isValid = /^\d+$/.test(initialNumberInput.value.trim());
      if (!invoiceNumberValidationActivated) {
        initialNumberInput.classList.remove("invalid");
        clearInvoiceNumberInlineError();
        return isValid;
      }
      initialNumberInput.classList.toggle("invalid", !isValid);
      if (!isValid) {
        showInvoiceNumberInlineError("Veuillez saisir un numéro valide.");
      } else {
        clearInvoiceNumberInlineError();
      }
      return isValid;
    }

    function submitInitialInvoiceNumber() {
      if (!validateInitialInvoiceNumber(true)) return;
      window.initialInvoiceNumber = Number(document.getElementById("initialNumber").value.trim());
      clearInvoiceNumberInlineError();
      showFormView();
    }

    function handleConfirmAction(action, confirmed) {
      if (action === "delete_rows") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .withFailureHandler(error => {
            showErrorView(error && error.message ? error.message : null);
          })
          .supprimerLignesCochées();
        return;
      }

      if (action === "facturer_continue") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
          showInvoiceNumberView();
        } else {
          showFormView();
        }
        return;
      }

      if (action === "replace_pdf") {
        if (!confirmed) {
          pendingInvoiceSubmission = null;
          showFormView();
          return;
        }
        if (!pendingInvoiceSubmission) {
          showErrorView(null);
          return;
        }
        submitInvoiceRequest(pendingInvoiceSubmission, true);
        return;
      }

      google.script.host.close();
    }

    function showConfirmView({ title, message, action, confirmLabel, cancelLabel }) {
      setPopupState({
        view: "confirmView",
        type: "confirm",
        title,
        message,
        footer: {
          primary: { label: confirmLabel || "Confirmer", visible: true },
          secondary: { label: cancelLabel || "Annuler", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: () => handleConfirmAction(action, true),
        secondaryAction: () => handleConfirmAction(action, false)
      });
    }

    function showMessageView({ title, message }) {
      setPopupState({
        view: "messageView",
        type: "alert",
        title,
        message,
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: null
      });
    }

    // Remplir les menus déroulants avec les données injectées
    function populateDropdowns() {
      const contactSelect = document.getElementById("contact");
      const activityTypeSelect = document.getElementById("activityType");

      // Vider les options existantes sauf les par défaut
      while (contactSelect.options.length > 2) contactSelect.remove(1);
      while (activityTypeSelect.options.length > 2) activityTypeSelect.remove(1);

      // Ajouter les contacts
      if (contacts && Array.isArray(contacts)) {
        contacts.forEach(contact => {
          const option = document.createElement("option");
          option.text = contact;
          option.value = contact;
          contactSelect.add(option, contactSelect.options[contactSelect.options.length - 1]);
        });
      }

      // Ajouter les types d'activité
      if (activityTypes && Array.isArray(activityTypes)) {
        activityTypes.forEach(activity => {
          const option = document.createElement("option");
          option.text = activity;
          option.value = activity;
          activityTypeSelect.add(option, activityTypeSelect.options[activityTypeSelect.options.length - 1]);
        });
      }

      // Sélectionner automatiquement la deuxième option
      contactSelect.selectedIndex = 0;
      activityTypeSelect.selectedIndex = 0;
      updateSelectPlaceholderState(contactSelect);
      updateSelectPlaceholderState(activityTypeSelect);
    }

    function validateForm(activateValidation = false) {
      if (activateValidation) {
        formValidationActivated = true;
      }
      const contactSelect = document.getElementById("contact");
      const newContact = document.getElementById("newContact");
      const newContactWrapper = document.getElementById("newContactWrapper");
      const activitySelect = document.getElementById("activityType");
      const newActivityType = document.getElementById("newActivityType");
      const newActivityTypeWrapper = document.getElementById("newActivityTypeWrapper");

      // Afficher/masquer les champs "Autre"
      newContactWrapper.style.display = contactSelect.value === "Autre" ? "flex" : "none";
      newActivityTypeWrapper.style.display = activitySelect.value === "Autre" ? "flex" : "none";

      // Valider les champs
      const isContactValid = contactSelect.value !== "" && 
        (contactSelect.value !== "Autre" || (newContact.value.trim() !== ""));
      const isActivityValid = activitySelect.value !== "" && 
        (activitySelect.value !== "Autre" || (newActivityType.value.trim() !== ""));

      updateSelectPlaceholderState(contactSelect);
      updateSelectPlaceholderState(activitySelect);

      if (!formValidationActivated) {
        contactSelect.classList.remove("invalid");
        newContact.classList.remove("invalid");
        activitySelect.classList.remove("invalid");
        newActivityType.classList.remove("invalid");
        return {
          isValid: isContactValid && isActivityValid
        };
      }

      contactSelect.classList.toggle("invalid", !isContactValid);
      newContact.classList.toggle("invalid", contactSelect.value === "Autre" && newContact.value.trim() === "");
      activitySelect.classList.toggle("invalid", !isActivityValid);
      newActivityType.classList.toggle("invalid", activitySelect.value === "Autre" && newActivityType.value.trim() === "");
      return {
        isValid: isContactValid && isActivityValid
      };
    }

    function closeOtherField(selectId, inputId, wrapperId) {
      const selectElement = document.getElementById(selectId);
      const inputElement = document.getElementById(inputId);
      const wrapperElement = document.getElementById(wrapperId);
      selectElement.value = "";
      inputElement.value = "";
      wrapperElement.style.display = "none";
      validateForm();
    }

    function showFormView() {
      formValidationActivated = false;
      clearFormValidationState();
      setPopupState({
        view: "formView",
        type: "form-simple",
        footer: {
          primary: { label: "Enregistrer", visible: true },
          secondary: { label: "Fermer", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: submit,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: null
      });
    }

    function showInvoiceNumberView() {
      invoiceNumberValidationActivated = false;
      clearFormValidationState();
      clearInvoiceNumberInlineError();
      setPopupState({
        view: "invoiceNumberView",
        type: "form-simple",
        footer: {
          primary: { label: "OK", visible: true },
          secondary: { label: "Fermer", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: submitInitialInvoiceNumber,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: null
      });
      document.getElementById("submit").disabled = false;
      document.getElementById("initialNumber").focus();
    }

    function showLoadingView(title = "Création de la facture", message = "Veuillez patienter...") {
      document.getElementById("loadingTitle").textContent = title;
      document.getElementById("loadingMessage").textContent = message;
      setPopupState({
        view: "loadingView",
        type: "action",
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: null,
        openPdfAction: null
      });
    }

    function showSuccessView(options = {}) {
      const emailSent = Boolean(options.emailSent);
      document.getElementById("successTitle").textContent = "Bravo";
      document.getElementById("successMessage").textContent = "La facture a été enregistrée avec succès.";
      setPopupState({
        view: "successView",
        type: "action",
        footer: {
          primary: { label: "Envoyer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: true }
        },
        primaryAction: showSendInvoiceFlow,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: openPdfAndClose
      });
      document.getElementById("submit").disabled = emailSent;
    }

    function showSendInvoiceView(defaultRecipientEmail) {
      const recipientSelect = document.getElementById("emailRecipient");
      const ccSelect = document.getElementById("emailCc");
      renderRecipientSelectOptions(
        recipientSelect,
        currentInvoiceRecipientOptions,
        "Destinataire principal",
        defaultRecipientEmail,
        false
      );
      renderRecipientSelectOptions(
        ccSelect,
        currentInvoiceRecipientOptions,
        "CC (optionnel)",
        "",
        true
      );
      setPopupState({
        view: "sendInvoiceView",
        type: "form-simple",
        footer: {
          primary: { label: "Envoyer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: true }
        },
        primaryAction: sendInvoiceEmailFromPopup,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: openPdfAndClose
      });
      validateSendInvoiceForm();
    }

    function showErrorView(message, options = {}) {
      if (!options.preserveInvoiceContext) {
        pdfUrl = "";
        currentInvoiceNumber = "";
      }
      setPopupState({
        view: "errorView",
        type: "alert",
        message,
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: options.secondaryLabel || "Retour", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: typeof options.secondaryAction === "function" ? options.secondaryAction : showFormView,
        openPdfAction: null
      });
    }

    function openPdfAndClose() {
      window.open(pdfUrl, '_blank');
      google.script.host.close();
    }

    function showSendInvoiceFlow() {
      if (!currentInvoiceNumber || !pdfUrl || emailSendCompleted) {
        return;
      }

      showLoadingView("Préparation de l’envoi", "Veuillez patienter...");

      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            currentInvoiceRecipientOptions = Array.isArray(result.recipientOptions) ? result.recipientOptions : [];
            showSendInvoiceView(result.defaultRecipientEmail || "");
          } else {
            showErrorView(result && result.message ? result.message : null, {
              preserveInvoiceContext: true,
              secondaryAction: () => showSuccessView({ emailSent: emailSendCompleted }),
              secondaryLabel: "Retour"
            });
          }
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? error.message : null, {
            preserveInvoiceContext: true,
            secondaryAction: () => showSuccessView({ emailSent: emailSendCompleted }),
            secondaryLabel: "Retour"
          });
        })
        .getInvoiceRecipientOptions(currentInvoiceNumber);
    }

    function sendInvoiceEmailFromPopup() {
      if (!currentInvoiceNumber || !pdfUrl || emailSendCompleted) {
        return;
      }
      if (!validateSendInvoiceForm()) {
        return;
      }

      document.getElementById("submit").disabled = true;

      const recipient = getSelectedRecipient("emailRecipient");
      const ccRecipient = getSelectedRecipient("emailCc");

      showLoadingView("Envoi du courriel", "Veuillez patienter...");

      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            emailSendCompleted = true;
            showSuccessView({ emailSent: true });
          } else {
            showErrorView(result && result.message ? result.message : null, {
              preserveInvoiceContext: true,
              secondaryAction: () => showSendInvoiceView(recipient ? recipient.email : ""),
              secondaryLabel: "Retour"
            });
          }
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? error.message : null, {
            preserveInvoiceContext: true,
            secondaryAction: () => showSendInvoiceView(recipient ? recipient.email : ""),
            secondaryLabel: "Retour"
          });
        })
        .sendInvoiceEmail(currentInvoiceNumber, pdfUrl, recipient, ccRecipient);
    }

    function submitInvoiceRequest(submissionData, overwriteExistingFile) {
      showLoadingView("Création de la facture", "Veuillez patienter...");

      google.script.run
        .withSuccessHandler(result => {
          if (result.success) {
            pendingInvoiceSubmission = null;
            pdfUrl = result.pdfUrl;
            currentInvoiceNumber = result.invoiceNumber || "";
            emailSendCompleted = false;
            showSuccessView({ emailSent: false });
          } else if (result.requiresConfirmation && result.confirmAction === "replace_pdf") {
            pendingInvoiceSubmission = submissionData;
            showConfirmView({
              title: result.confirmTitle,
              message: result.message,
              action: result.confirmAction,
              confirmLabel: result.confirmPrimaryLabel,
              cancelLabel: result.confirmSecondaryLabel
            });
          } else {
            pendingInvoiceSubmission = null;
            showErrorView(result.message);
          }
        })
        .withFailureHandler(error => {
          pendingInvoiceSubmission = null;
          showErrorView(error && error.message ? `Erreur inattendue : ${error.message}` : null);
        })
        .submitFacturerForm(submissionData.contact, submissionData.activityType, window.initialInvoiceNumber, overwriteExistingFile);
    }

    function submit() {
      const validation = validateForm(true);
      if (!validation.isValid) {
        return;
      }
      const contact = document.getElementById("contact").value === "Autre" ? 
        document.getElementById("newContact").value.trim() : 
        document.getElementById("contact").value;
      const activityType = document.getElementById("activityType").value === "Autre" ? 
        document.getElementById("newActivityType").value.trim() : 
        document.getElementById("activityType").value;

      pendingInvoiceSubmission = { contact, activityType };
      submitInvoiceRequest(pendingInvoiceSubmission, false);
    }

    // Remplir les menus déroulants au chargement
    document.addEventListener("DOMContentLoaded", () => {
      populateDropdowns();
      if (window.showStartupConfirm) {
        showConfirmView({
          title: window.confirmViewTitle,
          message: window.confirmViewMessage,
          action: window.confirmAction,
          confirmLabel: window.confirmPrimaryLabel,
          cancelLabel: window.confirmSecondaryLabel
        });
      } else if (window.showStandaloneMessage) {
        showMessageView({
          title: window.messageViewTitle,
          message: window.messageViewMessage
        });
      } else if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
        showInvoiceNumberView();
      } else {
        showFormView();
      }
    });
  </script>
</body>
</html>
