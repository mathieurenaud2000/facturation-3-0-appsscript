<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      margin: 0;
      padding: 10px 0 0 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .container.invoice-preview-mode {
      padding: 0;
    }

    /* Base commune de typage des popups.
       Ces classes vivent en parallèle de la structure actuelle pour préparer
       une standardisation progressive, sans imposer une migration immédiate. */
    .container[class*="popup-type-"] .popup-view.active {
      width: 100%;
      align-self: center;
      margin: 0;
      padding: 0;
    }

    /* alert = petit popup d'information ou d'erreur simple */
    .popup-type-alert .popup-view.active {
      max-width: 360px;
    }

    /* confirm = confirmation courte avec peu de contenu */
    .popup-type-confirm .popup-view.active {
      max-width: 380px;
    }

    /* form-simple = formulaire court à faible densité */
    .popup-type-form-simple .popup-view.active {
      max-width: 420px;
    }

    /* form-complex = formulaire plus riche, prévu pour des vues plus denses */
    .popup-type-form-complex .popup-view.active {
      max-width: 520px;
    }

    /* action = états de succès, téléchargement, envoi ou actions guidées */
    .popup-type-action .popup-view.active {
      max-width: 440px;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .form-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
      gap: 15px;
    }

    .invoice-number-view {
      justify-content: flex-start;
      padding: 0;
      width: 100%;
    }

    #invoiceNumberView.popup-view.active {
      flex: 0 0 auto;
      max-width: 690px;
    }

    .invoice-number-layout {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: 52px 52px 52px 52px;
      column-gap: 24px;
      row-gap: 15px;
      align-items: start;
    }

    .invoice-number-label {
      grid-column: 1;
      grid-row: 1;
      align-self: end;
      font-size: calc(13pt + 2px);
      line-height: 1.2;
      color: #9d9d9d;
      text-align: left;
    }

    .invoice-number-field {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      align-items: flex-start;
      width: 100%;
    }

    #invoiceNumberView #initialNumber {
      width: 30%;
      min-width: 0;
    }

    .invoice-number-actions {
      grid-column: 2;
      grid-row: 4;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
      min-height: 52px;
      position: relative;
      z-index: 1;
    }

    .invoice-number-actions .btn {
      width: 100%;
      height: 100%;
      margin-left: 0;
      padding: 0 24px;
    }

    #formView.form-view {
      justify-content: flex-start;
      padding: 0;
      width: 100%;
      gap: 0;
    }

    #formView.popup-view.active {
      flex: 0 0 auto;
      max-width: 690px;
    }

    .service-title-layout {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: 52px 52px 52px 52px;
      column-gap: 24px;
      row-gap: 15px;
      align-items: start;
    }

    .service-title-label {
      grid-column: 1;
      grid-row: 1;
      align-self: end;
      font-size: calc(13pt + 2px);
      line-height: 1.2;
      color: #9d9d9d;
      text-align: left;
    }

    .service-title-field {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      align-items: flex-start;
      width: 100%;
    }

    .service-title-select-wrapper {
      width: 100%;
    }

    #formView #activityType {
      width: 100%;
      min-width: 0;
    }

    .service-title-actions {
      grid-column: 2;
      grid-row: 4;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
      min-height: 52px;
      position: relative;
      z-index: 1;
    }

    .service-title-actions .btn {
      width: 100%;
      height: 100%;
      margin-left: 0;
      padding: 0 24px;
    }

    .confirm-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .invoice-preview-mode .confirm-view,
    .invoice-preview-mode .invoice-edit-view {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
      width: 100%;
      height: 100%;
      max-width: none !important;
      font-family: Roboto, sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #000000;
    }

    .technical-confirm-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .invoice-preview-content,
    .invoice-edit-content {
      display: none;
      width: 100%;
      height: calc(100vh - 80px);
      flex-direction: column;
      overflow: hidden;
      background: #ffffff;
    }

    .invoice-preview-mode .invoice-preview-content,
    .invoice-preview-mode .invoice-edit-content {
      display: flex;
    }

    .invoice-preview-scroll {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 10px 0 0 0;
    }

    .invoice-edit-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .invoice-summary-grid {
      display: grid;
      grid-template-columns: 60px minmax(0, 1fr) 100px;
      gap: 6px 12px;
      padding-bottom: 12px;
    }

    .invoice-summary-label,
    .invoice-summary-value,
    .invoice-summary-meta {
      font-family: Roboto, sans-serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.25;
      color: #000000;
    }

    .invoice-summary-label {
      font-weight: 400;
      color: #aaaaaa;
      text-align: left;
    }

    .invoice-summary-value {
      word-break: break-word;
      text-align: left;
    }

    .invoice-summary-value-row {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
    }

    .invoice-edit-link {
      border: none;
      background: transparent;
      color: #bfbfbf;
      cursor: pointer;
      font: inherit;
      line-height: 1;
      padding: 0;
      margin: 0;
      display: inline-flex;
      align-items: center;
      vertical-align: baseline;
    }

    .invoice-edit-link .material-symbols-outlined {
      font-size: 20px;
      line-height: 1;
      color: #bfbfbf;
      margin-left: 5px;
      transform: translateY(3px);
    }

    .invoice-summary-meta {
      grid-column: 3;
      grid-row: 1 / span 3;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      text-align: right;
      justify-content: flex-start;
    }

    #previewInvoiceNumberValue,
    #previewInvoiceDateValue {
      font-weight: 400;
      color: #aaaaaa;
    }

    .invoice-blocks {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 25px;
    }

    .invoice-preview-block {
      display: grid;
      grid-template-columns: 60px minmax(0, 1fr);
      column-gap: 12px;
      padding: 25px 0;
      margin: 0;
      border-top: 1px solid #000000;
      background: #ffffff;
    }

    .invoice-block-number {
      grid-column: 1;
      grid-row: 1 / span 3;
      color: #aaaaaa;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.25;
      text-align: left;
      align-self: start;
      padding-top: 0;
    }

    .invoice-block-content {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .invoice-block-topline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 100px;
      column-gap: 12px;
      align-items: start;
    }

    .invoice-block-heading {
      min-width: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
      color: #000000;
      word-break: break-word;
    }

    .invoice-block-total {
      font-size: 18px;
      line-height: 1.25;
      font-weight: 400;
      color: #aaaaaa;
      text-align: right;
      white-space: nowrap;
    }

    .invoice-block-description {
      font-size: 18px;
      line-height: 1.25;
      color: #000000;
      margin: 10px 0 15px 0;
      white-space: pre-line;
    }

    .invoice-activity-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 0;
    }

    .invoice-activity-item {
      display: grid;
      grid-template-columns: 180px 80px minmax(0, 1fr);
      column-gap: 12px;
      font-size: 18px;
      line-height: 1.25;
      color: #aaaaaa;
    }

    .invoice-activity-name {
      text-align: left;
      min-width: 0;
    }

    .invoice-activity-time {
      color: #aaaaaa;
      white-space: nowrap;
      text-align: right;
    }

    .invoice-edit-label {
      font-size: 18px;
      font-weight: 700;
      color: #000000;
      line-height: 1.25;
    }

    .invoice-edit-field,
    .invoice-edit-textarea {
      width: 100%;
      border: 1px solid #000000;
      border-radius: 0;
      padding: 10px;
      font-size: 18px;
      font-weight: 400;
      color: #000000;
      background: #ffffff;
      font-family: Roboto, sans-serif;
    }

    .invoice-edit-textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.3;
    }

    .message-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .status-view {
      flex-direction: column;
      justify-content: flex-start;
      padding: 60px 0 0 0;
    }

    #loadingView.status-view {
      justify-content: center;
      padding: 0 0 75px 0;
    }

    #loadingTitle,
    #loadingMessage {
      display: none;
    }

    .error-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .popup-view.active {
      display: flex;
    }

    select, input {
      width: 100%;
      margin: 0;
      padding: 10px;
      border: 1px solid #000000;
      border-radius: 7px;
      font-size: calc(13pt + 2px);
      color: #000;
      background: #fff;
    }

    select:disabled, input:disabled {
      border: 1px solid #f7f7f7;
      color: #9a9a9a;
      background: #f7f7f7;
    }

    input::placeholder {
      color: #c8c8c8;
      opacity: 1;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 42px;
      color: #000000;
      background-image:
        linear-gradient(45deg, transparent 50%, #000000 50%),
        linear-gradient(135deg, #000000 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% + 1px),
        calc(100% - 14px) calc(50% + 1px);
      background-size: 10px 10px, 10px 10px;
      background-repeat: no-repeat;
    }

    select.is-placeholder {
      color: #c8c8c8;
    }

    select option {
      color: #000000;
    }

    select option[value=""] {
      color: #c8c8c8;
    }

    select.invalid, input.invalid {
      border: 1px solid #ff0000;
    }

    .inline-field {
      display: flex;
      align-items: stretch;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      margin-top: 0;
    }

    .inline-field input {
      flex: 1;
      min-height: 52px;
    }

    .icon-btn {
      width: 52px;
      min-width: 52px;
      height: 52px;
      min-height: 52px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      line-height: 1;
    }

    .icon-btn:hover {
      background: transparent;
    }

    .icon-btn .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding-bottom: 0;
      padding-right: 0;
    }

    .invoice-preview-mode .footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 2fr);
      column-gap: 30px;
      align-items: end;
      width: 100%;
      height: 80px;
      padding: 12px 0 0 0;
      background: #ffffff;
      border-top: none;
    }

    .invoice-preview-mode #invoiceScrollArrow {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
      align-self: start;
    }

    .invoice-preview-mode #close {
      grid-column: 2;
      grid-row: 1;
      align-self: end;
      justify-self: stretch;
      display: inline-flex !important;
      height: 68px;
      min-height: 68px;
      min-width: 0;
      max-width: 100%;
      margin-left: 0;
      margin-right: 0;
      padding-top: 0;
      padding-bottom: 0;
      width: 100%;
    }

    .invoice-preview-mode #submit {
      grid-column: 3;
      grid-row: 1;
      align-self: end;
      justify-self: stretch;
      display: inline-flex !important;
      height: 68px;
      min-height: 68px;
      min-width: 0;
      max-width: 100%;
      margin-left: 0;
      padding-top: 0;
      padding-bottom: 0;
      width: 100%;
    }

    .invoice-preview-mode .btn {
      font-size: 22px;
      font-weight: 700;
      font-family: Roboto, sans-serif;
    }

    .btn {
      margin-right: 0;
      margin-left: 20px;
      min-height: 52px;
      padding: 0 25px;
      border-radius: 7px;
      cursor: pointer;
      border: none;
      font-size: 23px;
      line-height: 1;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .footer .btn:first-child {
      margin-left: 0;
    }

    .scroll-arrow {
      width: 52px;
      min-width: 52px;
      height: 52px;
      min-height: 52px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #efefef;
      cursor: default;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .scroll-arrow .material-symbols-outlined {
      font-size: 30px;
      line-height: 1;
    }

    .scroll-arrow.is-active {
      color: #00983a;
      cursor: pointer;
    }

    .btn-green {
      background-color: #00983a;
      color: white;
      border: 1px solid #00983a;
    }

    .btn-green:hover {
      background-color: #1ecc00;
      border: 1px solid #1ecc00;
    }

    .btn-white {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #d4d4d4;
    }

    .btn-white:hover {
      background-color: #ffffff;
      border: 1px solid #000000;
    }

    .btn-green:disabled,
    .btn-green[disabled],
    .btn-green.disabled,
    .btn:disabled.btn-green,
    .btn[disabled].btn-green,
    .btn.btn-green.disabled {
      background-color: #efefef;
      border: 1px solid #efefef;
      color: #ffffff;
      cursor: not-allowed;
    }

    .loading-spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #4CAF50;
      border-radius: 50%;
      width: 90px;
      height: 90px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .message-sub {
      font-size: 14pt;
      text-align: center;
      white-space: pre-line;
    }

    .success-icon {
      color: #4CAF50;
      font-size: 90px;
      margin-bottom: 15px;
    }

    .message {
      font-size: 14pt;
      text-align: center;
      margin-bottom: 20px;
    }

    .inline-error {
      width: 100%;
      color: #b00020;
      font-size: 11pt;
      text-align: left;
      margin-top: 10px;
      display: none !important;
    }

    .inline-error.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="popupContainer" class="container">
    <!-- Vue numéro initial -->
    <div id="invoiceNumberView" class="popup-view invoice-number-view">
      <div class="invoice-number-layout">
        <div class="invoice-number-label">Numéro</div>
        <div class="invoice-number-field">
          <input type="text" id="initialNumber" inputmode="numeric" autocomplete="off" pattern="[0-9]*" onkeydown="return allowOnlyInitialInvoiceNumberKey(event)" onpaste="handleInitialInvoiceNumberPaste(event)" oninput="sanitizeInitialInvoiceNumber(); validateInitialInvoiceNumber()">
          <div id="invoiceNumberError" class="inline-error" aria-live="polite"></div>
        </div>
        <div class="invoice-number-actions">
          <button type="button" class="btn btn-white" onclick="google.script.host.close()">Fermer</button>
          <button type="button" class="btn btn-green" disabled onclick="submitInitialInvoiceNumber()">OK</button>
        </div>
      </div>
    </div>
    <!-- Vue confirmation -->
    <div id="confirmView" class="popup-view confirm-view">
      <div id="technicalConfirmContent" class="technical-confirm-content">
        <div class="message-title" id="confirmTitle"></div>
        <div class="message-sub" id="confirmMessage"></div>
      </div>
      <div id="invoicePreviewContent" class="invoice-preview-content">
        <div id="invoicePreviewScroll" class="invoice-preview-scroll">
          <section class="invoice-summary-grid" aria-label="Résumé de la facture">
            <div class="invoice-summary-label">Client</div>
            <div class="invoice-summary-value" id="previewClientValue"></div>
            <div class="invoice-summary-meta">
              <div id="previewInvoiceNumberValue"></div>
              <div id="previewInvoiceDateValue"></div>
              <div id="previewTotalValue"></div>
            </div>
            <div class="invoice-summary-label" id="previewProjectsLabel">Projet</div>
            <div class="invoice-summary-value" id="previewProjectsValue"></div>
            <div class="invoice-summary-label">Titre</div>
            <div class="invoice-summary-value-row">
              <span class="invoice-summary-value" id="previewServiceTitleValue"></span><button type="button" class="invoice-edit-link" onclick="showEditTitleView()" aria-label="Modifier le titre"><span class="material-symbols-outlined">edit_square</span></button>
            </div>
          </section>
          <section id="invoicePreviewBlocks" class="invoice-blocks" aria-label="Blocs facturés"></section>
        </div>
      </div>
    </div>
    <!-- Vue édition du titre -->
    <div id="editTitleView" class="popup-view invoice-edit-view">
      <div class="invoice-edit-content">
        <div class="invoice-edit-body">
          <div class="invoice-edit-label">Titre</div>
          <input type="text" id="editServiceTitleInput" class="invoice-edit-field" autocomplete="off" oninput="validateEditTitleView()">
        </div>
      </div>
    </div>
    <!-- Vue édition d'une description -->
    <div id="editDescriptionView" class="popup-view invoice-edit-view">
      <div class="invoice-edit-content">
        <div class="invoice-edit-body">
          <div class="invoice-edit-label">Description</div>
          <textarea id="editDescriptionInput" class="invoice-edit-textarea"></textarea>
        </div>
      </div>
    </div>
    <!-- Vue message -->
    <div id="messageView" class="popup-view message-view">
      <div class="message-title" id="messageViewTitle"></div>
      <div class="message-sub" id="messageViewMessage"></div>
    </div>
    <!-- Formulaire initial -->
    <div id="formView" class="popup-view form-view active">
      <div class="service-title-layout">
        <div class="service-title-label">Titre</div>
        <div class="service-title-field">
          <div id="activityTypeSelectWrapper" class="service-title-select-wrapper">
            <select id="activityType" onchange="validateForm()"></select>
          </div>
          <div id="newActivityTypeWrapper" class="inline-field" style="display:none;">
            <input type="text" id="newActivityType" autocomplete="off" oninput="validateForm()">
            <button type="button" class="icon-btn" onclick="closeOtherField('activityType', 'newActivityType', 'newActivityTypeWrapper')"><span class="material-symbols-outlined">close</span></button>
          </div>
        </div>
        <div class="service-title-actions">
          <button type="button" class="btn btn-white" onclick="google.script.host.close()">Fermer</button>
          <button type="button" class="btn btn-green" disabled onclick="submit()">OK</button>
        </div>
      </div>
    </div>
    <!-- État de chargement -->
    <div id="loadingView" class="popup-view status-view">
      <div class="loading-spinner"></div>
      <div class="message-title" id="loadingTitle">Création de la facture</div>
      <div class="message-sub" id="loadingMessage">Veuillez patienter...</div>
    </div>
    <!-- État de succès -->
    <div id="successView" class="popup-view status-view">
      <i class="fas fa-check-circle success-icon"></i>
      <div class="message-title" id="successTitle">Bravo</div>
      <div class="message" id="successMessage">La facture a été enregistrée avec succès.</div>
    </div>
    <!-- État d'envoi -->
    <div id="sendInvoiceView" class="popup-view form-view">
      <div class="message-title">Envoyer la facture à</div>
      <select id="emailRecipient" onchange="validateSendInvoiceForm()"></select>
      <select id="emailCc" onchange="validateSendInvoiceForm()"></select>
    </div>
    <!-- État d'erreur -->
    <div id="errorView" class="popup-view error-view">
      <div class="message" id="errorMessage"></div>
    </div>
    <!-- Pied de page -->
    <div class="footer">
      <button id="invoiceScrollArrow" class="scroll-arrow" type="button" onclick="handleInvoiceScrollArrow()" aria-label="Bloc suivant">
        <span class="material-symbols-outlined">arrow_downward</span>
      </button>
      <button id="submit" class="btn btn-green" disabled onclick="handlePrimaryAction()">Générer la facture</button>
      <button id="close" class="btn btn-white" style="display:none;" onclick="handleSecondaryAction()">Fermer</button>
      <button id="openPdf" class="btn btn-green" style="display:none;" onclick="handleOpenPdfAction()">Télécharger</button>
    </div>
  </div>

  <script>
    let pdfUrl = '';
    let currentInvoiceNumber = '';
    let currentInvoiceRecipientOptions = [];
    let currentInvoicePreview = null;
    let currentPrimaryAction = null;
    let currentSecondaryAction = null;
    let currentOpenPdfAction = null;
    let pendingInvoiceSubmission = null;
    let currentEditingDescriptionIndex = null;
    let emailSendCompleted = false;
    let formValidationActivated = false;
    let invoiceNumberValidationActivated = false;
    /* Le moteur supporte désormais une notion de type logique.
       Elle est ajoutée en parallèle des vues existantes pour préparer
       les futures migrations UI sans casser les appels actuels. */
    const popupTypeClasses = [
      "popup-type-alert",
      "popup-type-confirm",
      "popup-type-form-simple",
      "popup-type-form-complex",
      "popup-type-action"
    ];
    /* Cette table classe les vues historiques dans les catégories communes.
       Elle sert de fallback automatique : les appels existants n'ont donc pas
       besoin d'être tous réécrits pour bénéficier du nouveau système. */
    const popupTypeByView = {
      invoiceNumberView: "form-simple",
      confirmView: "confirm",
      editTitleView: "form-complex",
      editDescriptionView: "form-complex",
      messageView: "alert",
      formView: "form-simple",
      loadingView: "action",
      successView: "action",
      sendInvoiceView: "form-simple",
      errorView: "alert"
    };
    const popupViewIds = ["invoiceNumberView", "confirmView", "editTitleView", "editDescriptionView", "messageView", "formView", "loadingView", "successView", "sendInvoiceView", "errorView"];
    if (typeof window.contacts === "undefined") {
      window.contacts = [];
    }
    if (typeof window.activityTypes === "undefined") {
      window.activityTypes = [];
    }
    if (typeof window.initialInvoiceNumber === "undefined") {
      window.initialInvoiceNumber = null;
    }
    if (typeof window.requiresInitialInvoiceSetup === "undefined") {
      window.requiresInitialInvoiceSetup = false;
    }
    if (typeof window.showStartupConfirm === "undefined") {
      window.showStartupConfirm = false;
    }
    if (typeof window.confirmViewTitle === "undefined") {
      window.confirmViewTitle = "";
    }
    if (typeof window.confirmViewMessage === "undefined") {
      window.confirmViewMessage = "";
    }
    if (typeof window.confirmAction === "undefined") {
      window.confirmAction = "";
    }
    if (typeof window.confirmPrimaryLabel === "undefined") {
      window.confirmPrimaryLabel = "";
    }
    if (typeof window.confirmSecondaryLabel === "undefined") {
      window.confirmSecondaryLabel = "";
    }
    if (typeof window.showStandaloneMessage === "undefined") {
      window.showStandaloneMessage = false;
    }
    if (typeof window.messageViewTitle === "undefined") {
      window.messageViewTitle = "";
    }
    if (typeof window.messageViewMessage === "undefined") {
      window.messageViewMessage = "";
    }

    function setActiveView(viewId) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle("active", id === viewId);
      });
    }

    function setInvoicePreviewMode(enabled) {
      document.getElementById("popupContainer").classList.toggle("invoice-preview-mode", Boolean(enabled));
    }

    function setFooterButtons(footer) {
      const normalizedFooter = Object.assign({
        primary: { label: "", visible: false },
        secondary: { label: "", visible: false },
        openPdf: { visible: false },
        scrollArrow: { visible: false, enabled: false }
      }, footer || {});
      const primaryButton = document.getElementById("submit");
      const secondaryButton = document.getElementById("close");
      const openPdfButton = document.getElementById("openPdf");
      const scrollArrowButton = document.getElementById("invoiceScrollArrow");

      primaryButton.style.display = normalizedFooter.primary.visible ? "block" : "none";
      secondaryButton.style.display = normalizedFooter.secondary.visible ? "block" : "none";
      openPdfButton.style.display = normalizedFooter.openPdf.visible ? "block" : "none";
      scrollArrowButton.style.display = normalizedFooter.scrollArrow.visible ? "inline-flex" : "none";
      scrollArrowButton.disabled = !normalizedFooter.scrollArrow.enabled;
      scrollArrowButton.classList.toggle("is-active", Boolean(normalizedFooter.scrollArrow.enabled));

      if (typeof normalizedFooter.primary.label === "string" && normalizedFooter.primary.label !== "") {
        primaryButton.textContent = normalizedFooter.primary.label;
      }
      if (typeof normalizedFooter.secondary.label === "string" && normalizedFooter.secondary.label !== "") {
        secondaryButton.textContent = normalizedFooter.secondary.label;
      }
    }

    /* Applique une catégorie visuelle/logique au conteneur principal.
       Le fallback est volontairement neutre : si aucun type n'est fourni,
       ou si le type est inconnu, on retire les classes de type et on laisse
       la présentation historique fonctionner telle quelle. */
    function applyPopupType(type) {
      const popupContainer = document.getElementById("popupContainer");
      popupTypeClasses.forEach(className => {
        popupContainer.classList.remove(className);
      });

      if (typeof type !== "string" || type.trim() === "") {
        return;
      }

      const normalizedType = `popup-type-${type.trim()}`;
      if (popupTypeClasses.includes(normalizedType)) {
        popupContainer.classList.add(normalizedType);
      }
    }

    /* Résout le type final appliqué à une vue.
       Priorité :
       1. le type passé explicitement par le flux courant
       2. le fallback défini par vue pour préserver l'existant
       3. aucun type si rien n'est défini */
    function resolvePopupType(type, view) {
      if (typeof type === "string" && type.trim() !== "") {
        return type.trim();
      }
      return popupTypeByView[view] || "";
    }

    function renderRecipientSelectOptions(selectElement, options, placeholder, selectedValue, allowEmptySelection) {
      selectElement.innerHTML = "";

      const placeholderOption = document.createElement("option");
      placeholderOption.value = "";
      placeholderOption.text = placeholder;
      selectElement.appendChild(placeholderOption);

      options.forEach(option => {
        const optionElement = document.createElement("option");
        optionElement.value = option.email;
        optionElement.text = option.name || option.email;
        optionElement.dataset.name = option.name || "";
        selectElement.appendChild(optionElement);
      });

      if (allowEmptySelection) {
        selectElement.value = selectedValue || "";
      } else if (selectedValue && options.some(option => option.email === selectedValue)) {
        selectElement.value = selectedValue;
      } else if (options.length > 0) {
        selectElement.value = options[0].email;
      } else {
        selectElement.value = "";
      }

      updateSelectPlaceholderState(selectElement);
    }

    function updateSelectPlaceholderState(selectElement) {
      if (!selectElement) return;
      selectElement.classList.toggle("is-placeholder", selectElement.value === "");
    }

    function validateSendInvoiceForm() {
      const recipientSelect = document.getElementById("emailRecipient");
      const isValid = recipientSelect.value.trim() !== "";
      document.getElementById("submit").disabled = !isValid;
      return isValid;
    }

    function getSelectedRecipient(selectId) {
      const selectElement = document.getElementById(selectId);
      const selectedOption = selectElement.options[selectElement.selectedIndex];
      if (!selectedOption || selectedOption.value === "") {
        return null;
      }
      return {
        name: selectedOption.dataset.name || "",
        email: selectedOption.value
      };
    }

    function setPopupState({
      view,
      type,
      title,
      message,
      footer,
      primaryAction,
      secondaryAction,
      openPdfAction
    }) {
      if (!["confirmView", "editTitleView", "editDescriptionView"].includes(view)) {
        setInvoicePreviewMode(false);
      }

      if (view === "formView") {
        pdfUrl = "";
        currentInvoiceNumber = "";
        currentInvoiceRecipientOptions = [];
        currentInvoicePreview = null;
        pendingInvoiceSubmission = null;
        emailSendCompleted = false;
      }

      if (view === "confirmView") {
        document.getElementById("confirmTitle").textContent = title || "";
        document.getElementById("confirmMessage").textContent = message || "";
      } else if (view === "messageView") {
        const safeTitle = typeof title === "string" && title.trim() !== "" ? title : "Information";
        const safeMessage = typeof message === "string" && message.trim() !== ""
          ? message
          : "Une erreur est survenue.";
        document.getElementById("messageViewTitle").textContent = safeTitle;
        document.getElementById("messageViewMessage").textContent = safeMessage;
      } else if (view === "errorView") {
        const safeMessage = typeof message === "string" && message.trim() !== ""
          ? message
          : "Une erreur est survenue.";
        document.getElementById("errorMessage").textContent = safeMessage;
      }

      if (view !== "errorView") {
        document.getElementById("errorMessage").textContent = "";
      }

      setActiveView(view);
      applyPopupType(resolvePopupType(type, view));
      setFooterButtons(footer);
      document.getElementById("submit").disabled = !footer || !footer.primary || !footer.primary.visible;
      currentPrimaryAction = typeof primaryAction === "function" ? primaryAction : null;
      currentSecondaryAction = typeof secondaryAction === "function" ? secondaryAction : null;
      currentOpenPdfAction = typeof openPdfAction === "function" ? openPdfAction : null;
    }

    function handlePrimaryAction() {
      if (typeof currentPrimaryAction === "function") {
        currentPrimaryAction();
      }
    }

    function handleSecondaryAction() {
      if (typeof currentSecondaryAction === "function") {
        currentSecondaryAction();
      }
    }

    function handleOpenPdfAction() {
      if (typeof currentOpenPdfAction === "function") {
        currentOpenPdfAction();
      }
    }

    function showInvoiceNumberInlineError(message) {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = "";
      errorElement.classList.remove("active");
    }

    function clearInvoiceNumberInlineError() {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = "";
      errorElement.classList.remove("active");
    }

    function setInvoiceNumberSubmitDisabled(disabled) {
      const button = document.querySelector("#invoiceNumberView .invoice-number-actions .btn-green");
      if (button) {
        button.disabled = disabled;
      }
    }

    function setFormSubmitDisabled(disabled) {
      const button = document.querySelector("#formView .service-title-actions .btn-green");
      if (button) {
        button.disabled = disabled;
      }
    }

    function setInvoiceNumberViewPopupSize() {
      if (typeof google === "undefined" || !google.script || !google.script.host) {
        return;
      }
      const invoiceNumberLayout = document.querySelector("#invoiceNumberView .invoice-number-layout");
      const measuredHeight = Math.ceil((invoiceNumberLayout ? invoiceNumberLayout.scrollHeight : 0) + 10) || 300;
      google.script.host.setWidth(690);
      google.script.host.setHeight(measuredHeight);
    }

    function setFormViewPopupSize() {
      if (typeof google === "undefined" || !google.script || !google.script.host) {
        return;
      }
      const formLayout = document.querySelector("#formView .service-title-layout");
      const measuredHeight = Math.ceil((formLayout ? formLayout.scrollHeight : 0) + 10) || 263;
      google.script.host.setWidth(690);
      google.script.host.setHeight(measuredHeight);
    }

    function setInvoicePreviewPopupSize() {
      if (typeof google === "undefined" || !google.script || !google.script.host) {
        return;
      }
      google.script.host.setWidth(900);
      google.script.host.setHeight(450);
    }

    function restoreDefaultFacturerPopupSize() {
      if (typeof google === "undefined" || !google.script || !google.script.host) {
        return;
      }
      google.script.host.setWidth(400);
      google.script.host.setHeight(350);
    }

    function sanitizeInitialInvoiceNumber() {
      const initialNumberInput = document.getElementById("initialNumber");
      initialNumberInput.value = initialNumberInput.value.replace(/\D+/g, "");
    }

    function allowOnlyInitialInvoiceNumberKey(event) {
      if (event.ctrlKey || event.metaKey || event.altKey) {
        return true;
      }

      const allowedKeys = ["Backspace", "Delete", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Tab", "Home", "End", "Enter"];
      if (allowedKeys.includes(event.key) || /^\d$/.test(event.key)) {
        return true;
      }

      event.preventDefault();
      return false;
    }

    function handleInitialInvoiceNumberPaste(event) {
      const pastedText = String((event.clipboardData || window.clipboardData).getData("text") || "");
      const digitsOnly = pastedText.replace(/\D+/g, "");
      event.preventDefault();

      const initialNumberInput = document.getElementById("initialNumber");
      const selectionStart = initialNumberInput.selectionStart ?? initialNumberInput.value.length;
      const selectionEnd = initialNumberInput.selectionEnd ?? initialNumberInput.value.length;

      initialNumberInput.value =
        initialNumberInput.value.slice(0, selectionStart) +
        digitsOnly +
        initialNumberInput.value.slice(selectionEnd);

      const caretPosition = selectionStart + digitsOnly.length;
      initialNumberInput.setSelectionRange(caretPosition, caretPosition);
      sanitizeInitialInvoiceNumber();
      validateInitialInvoiceNumber();
    }

    function clearFormValidationState() {
      ["activityType", "newActivityType", "initialNumber"].forEach(id => {
        const field = document.getElementById(id);
        if (field) {
          field.classList.remove("invalid");
        }
      });
      clearInvoiceNumberInlineError();
    }

    function validateInitialInvoiceNumber(activateValidation = false) {
      if (activateValidation) {
        invoiceNumberValidationActivated = true;
      }
      const initialNumberInput = document.getElementById("initialNumber");
      const isValid = /^\d+$/.test(initialNumberInput.value.trim());
      setInvoiceNumberSubmitDisabled(!isValid);
      if (!invoiceNumberValidationActivated) {
        initialNumberInput.classList.remove("invalid");
        clearInvoiceNumberInlineError();
        return isValid;
      }
      initialNumberInput.classList.toggle("invalid", !isValid);
      if (!isValid) {
        showInvoiceNumberInlineError("Veuillez saisir un numéro valide.");
      } else {
        clearInvoiceNumberInlineError();
      }
      return isValid;
    }

    function submitInitialInvoiceNumber() {
      if (!validateInitialInvoiceNumber(true)) return;
      window.initialInvoiceNumber = Number(document.getElementById("initialNumber").value.trim());
      clearInvoiceNumberInlineError();
      submit();
    }

    function handleConfirmAction(action, confirmed) {
      if (action === "delete_rows") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .withFailureHandler(error => {
            showErrorView(error && error.message ? error.message : null);
          })
          .supprimerLignesCochées();
        return;
      }

      if (action === "facturer_continue") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
          showInvoiceNumberView();
        } else {
          submit();
        }
        return;
      }

      if (action === "replace_pdf") {
        if (!confirmed) {
          pendingInvoiceSubmission = null;
          google.script.host.close();
          return;
        }
        if (!pendingInvoiceSubmission) {
          showErrorView(null);
          return;
        }
        submitInvoiceRequest(pendingInvoiceSubmission, true);
        return;
      }

      if (action === "invoice_preview_confirm") {
        if (!confirmed) {
          currentInvoicePreview = null;
          google.script.host.close();
          return;
        }
        if (!pendingInvoiceSubmission) {
          showErrorView(null);
          return;
        }
        submitInvoiceRequest(pendingInvoiceSubmission, false);
        return;
      }

      google.script.host.close();
    }

    function formatPreviewMoney(value) {
      const numericValue = Number(value);
      return Number.isFinite(numericValue) ? `${numericValue.toFixed(2)} $` : "";
    }

    function formatPreviewTime(value) {
      const numericValue = Number(value);
      return Number.isFinite(numericValue) ? `${numericValue.toFixed(2)} h` : "";
    }

    function getPreviewBlockTitle(block) {
      const titleParts = [block.campaign, block.project].map(value => String(value || "").trim()).filter(Boolean);
      return titleParts.length ? titleParts.join(" — ") : "Bloc sans titre";
    }

    function formatFrenchList(items) {
      const values = Array.isArray(items)
        ? items.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      if (values.length <= 2) {
        return values.join(" et ");
      }
      return `${values.slice(0, -1).join(", ")} et ${values[values.length - 1]}`;
    }

    function setInvoiceScrollArrowEnabled(enabled) {
      const scrollArrowButton = document.getElementById("invoiceScrollArrow");
      scrollArrowButton.disabled = !enabled;
      scrollArrowButton.classList.toggle("is-active", Boolean(enabled));
    }

    function getNextInvoicePreviewBlockTarget() {
      const scrollElement = document.getElementById("invoicePreviewScroll");
      if (!scrollElement) return null;
      const blocks = Array.from(scrollElement.querySelectorAll(".invoice-preview-block"));
      if (!blocks.length || scrollElement.scrollHeight <= scrollElement.clientHeight + 1) {
        return null;
      }

      const tolerance = 1;
      const isScrolledToBottom = scrollElement.scrollTop + scrollElement.clientHeight >= scrollElement.scrollHeight - tolerance;
      if (isScrolledToBottom) {
        return null;
      }

      const containerRect = scrollElement.getBoundingClientRect();
      return blocks.find(block => {
        const blockRect = block.getBoundingClientRect();
        const isNextBlock = blockRect.top > containerRect.top + tolerance;
        const isNotFullyVisible = blockRect.bottom > containerRect.bottom - tolerance;
        return isNextBlock && isNotFullyVisible;
      }) || null;
    }

    function updateInvoiceScrollArrowState() {
      setInvoiceScrollArrowEnabled(Boolean(getNextInvoicePreviewBlockTarget()));
    }

    function handleInvoiceScrollArrow() {
      const scrollElement = document.getElementById("invoicePreviewScroll");
      const targetBlock = getNextInvoicePreviewBlockTarget();
      if (!scrollElement || !targetBlock) {
        updateInvoiceScrollArrowState();
        return;
      }

      const containerRect = scrollElement.getBoundingClientRect();
      const targetRect = targetBlock.getBoundingClientRect();
      const nextScrollTop = scrollElement.scrollTop + targetRect.top - containerRect.top;
      scrollElement.scrollTo({ top: nextScrollTop, behavior: "smooth" });
      window.setTimeout(updateInvoiceScrollArrowState, 350);
    }

    function renderInvoicePreviewConfirmView() {
      const preview = currentInvoicePreview || {};
      const blocks = Array.isArray(preview.blocks) ? preview.blocks : [];
      const campaigns = [...new Set(blocks.map(block => String(block.campaign || "").trim()).filter(Boolean))];
      document.getElementById("previewClientValue").textContent = preview.client || "";
      document.getElementById("previewProjectsLabel").textContent = campaigns.length > 1 ? "Projets" : "Projet";
      document.getElementById("previewProjectsValue").textContent = formatFrenchList(campaigns);
      document.getElementById("previewServiceTitleValue").textContent = preview.serviceTitle || "";
      document.getElementById("previewInvoiceNumberValue").textContent = preview.invoiceNumber ? `#${preview.invoiceNumber}` : "";
      document.getElementById("previewInvoiceDateValue").textContent = preview.invoiceDate || "";
      document.getElementById("previewTotalValue").textContent = formatPreviewMoney(preview.totalAmount);

      const blocksContainer = document.getElementById("invoicePreviewBlocks");
      blocksContainer.innerHTML = "";
      blocks.forEach((block, index) => {
        const blockElement = document.createElement("article");
        blockElement.className = "invoice-preview-block";
        blockElement.dataset.blockIndex = String(index);

        const numberElement = document.createElement("div");
        numberElement.className = "invoice-block-number";
        numberElement.textContent = String(block.blockNumber || index + 1);

        const contentElement = document.createElement("div");
        contentElement.className = "invoice-block-content";

        const topLineElement = document.createElement("div");
        topLineElement.className = "invoice-block-topline";

        const titleElement = document.createElement("div");
        titleElement.className = "invoice-block-heading";
        titleElement.textContent = getPreviewBlockTitle(block);

        const totalTimeElement = document.createElement("div");
        totalTimeElement.className = "invoice-block-total";
        totalTimeElement.textContent = formatPreviewTime(block.totalTime);

        const totalPriceElement = document.createElement("div");
        totalPriceElement.className = "invoice-block-total";
        totalPriceElement.textContent = formatPreviewMoney(block.totalPrice);

        topLineElement.appendChild(titleElement);
        topLineElement.appendChild(totalTimeElement);
        topLineElement.appendChild(totalPriceElement);

        const descriptionElement = document.createElement("div");
        descriptionElement.className = "invoice-block-description";
        const descriptionText = document.createElement("span");
        descriptionText.textContent = block.description || "";

        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "invoice-edit-link";
        editButton.setAttribute("aria-label", "Modifier la description");
        editButton.innerHTML = '<span class="material-symbols-outlined">edit_square</span>';
        editButton.addEventListener("click", () => showEditDescriptionView(index));

        descriptionElement.appendChild(descriptionText);
        descriptionElement.appendChild(editButton);

        const activityList = document.createElement("ul");
        activityList.className = "invoice-activity-list";
        const activities = Array.isArray(block.activities) ? block.activities : [];
        activities.forEach(activity => {
          const activityItem = document.createElement("li");
          activityItem.className = "invoice-activity-item";

          const activityName = document.createElement("span");
          activityName.className = "invoice-activity-name";
          activityName.textContent = activity.name || "";

          const activityTime = document.createElement("span");
          activityTime.className = "invoice-activity-time";
          activityTime.textContent = formatPreviewTime(activity.time);

          const activityEmptyColumn = document.createElement("span");

          activityItem.appendChild(activityName);
          activityItem.appendChild(activityTime);
          activityItem.appendChild(activityEmptyColumn);
          activityList.appendChild(activityItem);
        });

        contentElement.appendChild(topLineElement);
        contentElement.appendChild(descriptionElement);
        contentElement.appendChild(activityList);

        blockElement.appendChild(numberElement);
        blockElement.appendChild(contentElement);
        blocksContainer.appendChild(blockElement);
      });

      const scrollElement = document.getElementById("invoicePreviewScroll");
      scrollElement.onscroll = updateInvoiceScrollArrowState;
      scrollElement.scrollTop = 0;
      window.requestAnimationFrame(updateInvoiceScrollArrowState);
    }

    function confirmInvoicePreview() {
      if (!pendingInvoiceSubmission) {
        showErrorView(null);
        return;
      }
      submitInvoiceRequest(pendingInvoiceSubmission, false);
    }

    function showInvoicePreviewConfirmView() {
      setInvoicePreviewMode(true);
      setInvoicePreviewPopupSize();
      document.getElementById("technicalConfirmContent").style.display = "none";
      document.getElementById("invoicePreviewContent").style.display = "flex";
      renderInvoicePreviewConfirmView();
      setPopupState({
        view: "confirmView",
        type: "confirm",
        footer: {
          primary: { label: "OK", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: false },
          scrollArrow: { visible: true, enabled: false }
        },
        primaryAction: confirmInvoicePreview,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: null
      });
      window.requestAnimationFrame(updateInvoiceScrollArrowState);
    }

    function validateEditTitleView() {
      const titleInput = document.getElementById("editServiceTitleInput");
      document.getElementById("submit").disabled = titleInput.value.trim() === "";
    }

    function showEditTitleView() {
      if (!currentInvoicePreview) return;
      setInvoicePreviewMode(true);
      setInvoicePreviewPopupSize();
      document.getElementById("editServiceTitleInput").value = currentInvoicePreview.serviceTitle || "";
      setPopupState({
        view: "editTitleView",
        type: "form-complex",
        footer: {
          primary: { label: "Enregistrer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: false },
          scrollArrow: { visible: false, enabled: false }
        },
        primaryAction: saveEditedServiceTitle,
        secondaryAction: showInvoicePreviewConfirmView,
        openPdfAction: null
      });
      validateEditTitleView();
      document.getElementById("editServiceTitleInput").focus();
    }

    function saveEditedServiceTitle() {
      if (!currentInvoicePreview) return;
      const nextTitle = document.getElementById("editServiceTitleInput").value.trim();
      if (!nextTitle) {
        validateEditTitleView();
        return;
      }
      currentInvoicePreview.serviceTitle = nextTitle;
      if (pendingInvoiceSubmission) {
        pendingInvoiceSubmission.activityType = nextTitle;
      }
      showInvoicePreviewConfirmView();
    }

    function showEditDescriptionView(blockIndex) {
      if (!currentInvoicePreview || !Array.isArray(currentInvoicePreview.blocks) || !currentInvoicePreview.blocks[blockIndex]) {
        return;
      }
      currentEditingDescriptionIndex = blockIndex;
      setInvoicePreviewMode(true);
      setInvoicePreviewPopupSize();
      document.getElementById("editDescriptionInput").value = currentInvoicePreview.blocks[blockIndex].description || "";
      setPopupState({
        view: "editDescriptionView",
        type: "form-complex",
        footer: {
          primary: { label: "Enregistrer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: false },
          scrollArrow: { visible: false, enabled: false }
        },
        primaryAction: saveEditedDescription,
        secondaryAction: showInvoicePreviewConfirmView,
        openPdfAction: null
      });
      document.getElementById("editDescriptionInput").focus();
    }

    function saveEditedDescription() {
      if (!currentInvoicePreview || !Array.isArray(currentInvoicePreview.blocks)) return;
      const targetBlock = currentInvoicePreview.blocks[currentEditingDescriptionIndex];
      if (!targetBlock) return;
      targetBlock.description = document.getElementById("editDescriptionInput").value.trim();
      currentEditingDescriptionIndex = null;
      showInvoicePreviewConfirmView();
    }

    function showConfirmView({ title, message, action, confirmLabel, cancelLabel }) {
      setInvoicePreviewMode(false);
      document.getElementById("technicalConfirmContent").style.display = "flex";
      document.getElementById("invoicePreviewContent").style.display = "none";
      setPopupState({
        view: "confirmView",
        type: "confirm",
        title,
        message,
        footer: {
          primary: { label: confirmLabel || "Confirmer", visible: true },
          secondary: { label: cancelLabel || "Annuler", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: () => handleConfirmAction(action, true),
        secondaryAction: () => handleConfirmAction(action, false)
      });
    }

    function showMessageView({ title, message }) {
      setPopupState({
        view: "messageView",
        type: "alert",
        title,
        message,
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: null
      });
    }

    // Remplir les menus déroulants avec les données injectées
    function populateDropdowns() {
      const activityTypeSelect = document.getElementById("activityType");
      activityTypeSelect.innerHTML = "";
      if (activityTypes && Array.isArray(activityTypes)) {
        activityTypes.forEach(activity => {
          const option = document.createElement("option");
          option.text = activity;
          option.value = activity;
          activityTypeSelect.add(option);
        });
      }
      const otherOption = document.createElement("option");
      otherOption.text = "Autre...";
      otherOption.value = "Autre...";
      activityTypeSelect.add(otherOption);

      const defaultActivityType = getDefaultActivityTypeValue();
      activityTypeSelect.value = defaultActivityType;
      document.getElementById("activityTypeSelectWrapper").style.display = "block";
      document.getElementById("newActivityTypeWrapper").style.display = "none";
      document.getElementById("newActivityType").value = "";
    }

    function getDefaultActivityTypeValue() {
      const activityTypeSelect = document.getElementById("activityType");
      if (!activityTypeSelect) {
        return "";
      }
      const defaultOption = Array.from(activityTypeSelect.options).find(option => option.value !== "" && option.value !== "Autre...");
      return defaultOption ? defaultOption.value : "";
    }

    function getDefaultContactValue() {
      if (!Array.isArray(window.contacts)) {
        return "";
      }
      const firstContact = window.contacts.find(contact => String(contact || "").trim() !== "");
      return firstContact ? String(firstContact).trim() : "";
    }

    function validateForm(activateValidation = false) {
      if (activateValidation) {
        formValidationActivated = true;
      }
      const activitySelect = document.getElementById("activityType");
      const newActivityType = document.getElementById("newActivityType");
      const activityTypeSelectWrapper = document.getElementById("activityTypeSelectWrapper");
      const newActivityTypeWrapper = document.getElementById("newActivityTypeWrapper");
      const isOtherMode = activitySelect.value === "Autre...";

      activityTypeSelectWrapper.style.display = isOtherMode ? "none" : "block";
      newActivityTypeWrapper.style.display = isOtherMode ? "flex" : "none";

      const isActivityValid = isOtherMode
        ? newActivityType.value.trim() !== ""
        : activitySelect.value !== "";
      setFormSubmitDisabled(!isActivityValid);

      if (!formValidationActivated) {
        activitySelect.classList.remove("invalid");
        newActivityType.classList.remove("invalid");
        return {
          isValid: isActivityValid
        };
      }

      activitySelect.classList.toggle("invalid", !isOtherMode && !isActivityValid);
      newActivityType.classList.toggle("invalid", isOtherMode && newActivityType.value.trim() === "");
      return {
        isValid: isActivityValid
      };
    }

    function closeOtherField(selectId, inputId, wrapperId) {
      const selectElement = document.getElementById(selectId);
      const inputElement = document.getElementById(inputId);
      const wrapperElement = document.getElementById(wrapperId);
      if (selectId === "activityType") {
        selectElement.value = getDefaultActivityTypeValue();
      } else {
        selectElement.value = "";
      }
      inputElement.value = "";
      wrapperElement.style.display = "none";
      validateForm();
    }

    function showFormView() {
      formValidationActivated = false;
      clearFormValidationState();
      setPopupState({
        view: "formView",
        type: "form-simple",
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: null,
        openPdfAction: null
      });
      setFormViewPopupSize();
      validateForm();
      const activitySelect = document.getElementById("activityType");
      const newActivityType = document.getElementById("newActivityType");
      if (activitySelect.value === "Autre...") {
        newActivityType.focus();
      } else {
        activitySelect.focus();
      }
    }

    function showInvoiceNumberView() {
      invoiceNumberValidationActivated = false;
      clearFormValidationState();
      clearInvoiceNumberInlineError();
      setPopupState({
        view: "invoiceNumberView",
        type: "form-simple",
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: null,
        openPdfAction: null
      });
      setInvoiceNumberViewPopupSize();
      validateInitialInvoiceNumber();
      document.getElementById("initialNumber").focus();
    }

    function showLoadingView(title = "Création de la facture", message = "Veuillez patienter...", useInvoicePreviewSize = false) {
      if (useInvoicePreviewSize) {
        setInvoicePreviewPopupSize();
      }
      document.getElementById("loadingTitle").textContent = title;
      document.getElementById("loadingMessage").textContent = message;
      setPopupState({
        view: "loadingView",
        type: "action",
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: "", visible: false },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: null,
        openPdfAction: null
      });
    }

    function showSuccessView(options = {}) {
      const emailSent = Boolean(options.emailSent);
      document.getElementById("successTitle").textContent = "Bravo";
      document.getElementById("successMessage").textContent = "La facture a été enregistrée avec succès.";
      setPopupState({
        view: "successView",
        type: "action",
        footer: {
          primary: { label: "Envoyer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: true }
        },
        primaryAction: showSendInvoiceFlow,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: openPdfAndClose
      });
      document.getElementById("submit").disabled = emailSent;
    }

    function showSendInvoiceView(defaultRecipientEmail) {
      const recipientSelect = document.getElementById("emailRecipient");
      const ccSelect = document.getElementById("emailCc");
      renderRecipientSelectOptions(
        recipientSelect,
        currentInvoiceRecipientOptions,
        "Destinataire principal",
        defaultRecipientEmail,
        false
      );
      renderRecipientSelectOptions(
        ccSelect,
        currentInvoiceRecipientOptions,
        "CC (optionnel)",
        "",
        true
      );
      setPopupState({
        view: "sendInvoiceView",
        type: "form-simple",
        footer: {
          primary: { label: "Envoyer", visible: true },
          secondary: { label: "Fermer", visible: true },
          openPdf: { visible: true }
        },
        primaryAction: sendInvoiceEmailFromPopup,
        secondaryAction: () => google.script.host.close(),
        openPdfAction: openPdfAndClose
      });
      validateSendInvoiceForm();
    }

    function showErrorView(message, options = {}) {
      if (!options.preserveInvoiceContext) {
        pdfUrl = "";
        currentInvoiceNumber = "";
      }
      setPopupState({
        view: "errorView",
        type: "alert",
        message,
        footer: {
          primary: { label: "", visible: false },
          secondary: { label: options.secondaryLabel || "Retour", visible: true },
          openPdf: { visible: false }
        },
        primaryAction: null,
        secondaryAction: typeof options.secondaryAction === "function" ? options.secondaryAction : showFormView,
        openPdfAction: null
      });
    }

    function openPdfAndClose() {
      window.open(pdfUrl, '_blank');
      google.script.host.close();
    }

    function showSendInvoiceFlow() {
      if (!currentInvoiceNumber || !pdfUrl || emailSendCompleted) {
        return;
      }

      showLoadingView("Préparation de l’envoi", "Veuillez patienter...");

      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            currentInvoiceRecipientOptions = Array.isArray(result.recipientOptions) ? result.recipientOptions : [];
            showSendInvoiceView(result.defaultRecipientEmail || "");
          } else {
            showErrorView(result && result.message ? result.message : null, {
              preserveInvoiceContext: true,
              secondaryAction: () => showSuccessView({ emailSent: emailSendCompleted }),
              secondaryLabel: "Retour"
            });
          }
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? error.message : null, {
            preserveInvoiceContext: true,
            secondaryAction: () => showSuccessView({ emailSent: emailSendCompleted }),
            secondaryLabel: "Retour"
          });
        })
        .getInvoiceRecipientOptions(currentInvoiceNumber);
    }

    function sendInvoiceEmailFromPopup() {
      if (!currentInvoiceNumber || !pdfUrl || emailSendCompleted) {
        return;
      }
      if (!validateSendInvoiceForm()) {
        return;
      }

      document.getElementById("submit").disabled = true;

      const recipient = getSelectedRecipient("emailRecipient");
      const ccRecipient = getSelectedRecipient("emailCc");

      showLoadingView("Envoi du courriel", "Veuillez patienter...");

      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            emailSendCompleted = true;
            showSuccessView({ emailSent: true });
          } else {
            showErrorView(result && result.message ? result.message : null, {
              preserveInvoiceContext: true,
              secondaryAction: () => showSendInvoiceView(recipient ? recipient.email : ""),
              secondaryLabel: "Retour"
            });
          }
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? error.message : null, {
            preserveInvoiceContext: true,
            secondaryAction: () => showSendInvoiceView(recipient ? recipient.email : ""),
            secondaryLabel: "Retour"
          });
        })
        .sendInvoiceEmail(currentInvoiceNumber, pdfUrl, recipient, ccRecipient);
    }

    function submitInvoiceRequest(submissionData, overwriteExistingFile) {
      showLoadingView("Création de la facture", "Veuillez patienter...", true);

      google.script.run
        .withSuccessHandler(result => {
          if (result.success) {
            pendingInvoiceSubmission = null;
            pdfUrl = result.pdfUrl;
            currentInvoiceNumber = result.invoiceNumber || "";
            emailSendCompleted = false;
            showSuccessView({ emailSent: false });
          } else if (result.requiresConfirmation && result.confirmAction === "replace_pdf") {
            pendingInvoiceSubmission = submissionData;
            showConfirmView({
              title: result.confirmTitle,
              message: result.message,
              action: result.confirmAction,
              confirmLabel: result.confirmPrimaryLabel,
              cancelLabel: result.confirmSecondaryLabel
            });
          } else {
            pendingInvoiceSubmission = null;
            showErrorView(result.message);
          }
        })
        .withFailureHandler(error => {
          pendingInvoiceSubmission = null;
          showErrorView(error && error.message ? `Erreur inattendue : ${error.message}` : null);
        })
        .submitFacturerForm(submissionData.contact, submissionData.activityType, window.initialInvoiceNumber, overwriteExistingFile);
    }

    function buildInvoicePreviewMessage(preview) {
      if (!preview) {
        return "Aperçu de facture prêt.";
      }
      const blocks = Array.isArray(preview.blocks) ? preview.blocks : [];
      const blockSummary = blocks.map(block => {
        const blockTitle = [block.campaign, block.project].filter(Boolean).join(" — ");
        const description = String(block.description || "").trim();
        const activitySummary = Array.isArray(block.activities)
          ? block.activities.map(activity => `${activity.name} (${activity.time}h)`).join(", ")
          : "";
        return [
          `${block.blockNumber}. ${blockTitle}`,
          description ? `Description : ${description}` : "",
          activitySummary ? `Activités : ${activitySummary}` : ""
        ].filter(Boolean).join("\n");
      }).join("\n\n");

      return [
        `Facture ${preview.invoiceNumber}`,
        `Client : ${preview.client}`,
        `Titre : ${preview.serviceTitle}`,
        `Total : ${preview.totalAmount}`,
        blockSummary
      ].filter(Boolean).join("\n\n");
    }

    function submit() {
      pendingInvoiceSubmission = null;
      showLoadingView("Préparation de la facture", "Veuillez patienter...", true);
      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            currentInvoicePreview = result.preview || {};
            pendingInvoiceSubmission = {
              contact: currentInvoicePreview.client || "",
              activityType: currentInvoicePreview.serviceTitle || ""
            };
            showInvoicePreviewConfirmView();
          } else {
            pendingInvoiceSubmission = null;
            currentInvoicePreview = null;
            showErrorView(result && result.message ? result.message : null, {
              secondaryAction: () => google.script.host.close(),
              secondaryLabel: "Fermer"
            });
          }
        })
        .withFailureHandler(error => {
          pendingInvoiceSubmission = null;
          currentInvoicePreview = null;
          showErrorView(error && error.message ? `Erreur inattendue : ${error.message}` : null, {
            secondaryAction: () => google.script.host.close(),
            secondaryLabel: "Fermer"
          });
        })
        .prepareInvoicePreview(window.initialInvoiceNumber);
    }

    // Remplir les menus déroulants au chargement
    document.addEventListener("DOMContentLoaded", () => {
      populateDropdowns();
      if (window.showStartupConfirm) {
        showConfirmView({
          title: window.confirmViewTitle,
          message: window.confirmViewMessage,
          action: window.confirmAction,
          confirmLabel: window.confirmPrimaryLabel,
          cancelLabel: window.confirmSecondaryLabel
        });
      } else if (window.showStandaloneMessage) {
        showMessageView({
          title: window.messageViewTitle,
          message: window.messageViewMessage
        });
      } else if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
        showInvoiceNumberView();
      } else {
        submit();
      }
    });
  </script>
</body>
</html>
