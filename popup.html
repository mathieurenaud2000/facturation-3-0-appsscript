<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .form-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .invoice-number-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .confirm-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .message-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .status-view {
      flex-direction: column;
      justify-content: flex-start;
      padding: 60px 0 0 0;
    }

    .error-view {
      justify-content: flex-start;
      padding: 40px 0 0 0;
    }

    .popup-view.active {
      display: flex;
    }

    .label {
      margin: 0;
      padding: 5px 0;
      font-size: 10pt;
      color: #888;
      width: 100%;
    }

    .activity-label, .invoice-number-label {
      padding-top: 20px;
    }

    select, input {
      width: 100%;
      margin: 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 0;
      font-size: 13pt;
      color: #000;
    }

    select.invalid, input.invalid {
      border: 1px solid #ff0000;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding-bottom: 0;
      padding-right: 0;
    }

    .btn {
      margin-right: 0;
      margin-left: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 18px;
      text-align: center;
    }

    .footer .btn:first-child {
      margin-left: 0;
    }

    .btn-green {
      background-color: #4CAF50;
      color: white;
      border: 1px solid #4CAF50;
    }

    .btn-green:hover {
      background-color: #45a049;
      border: 1px solid #45a049;
    }

    .btn-white {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #000000;
    }

    .btn-white:hover {
      background-color: #f0f0f0;
    }

    .btn:disabled {
      background-color: #cccccc;
      border: 1px solid #cccccc;
      cursor: not-allowed;
    }

    .loading-spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #4CAF50;
      border-radius: 50%;
      width: 90px;
      height: 90px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .message-sub {
      font-size: 14pt;
      text-align: center;
      white-space: pre-line;
    }

    .success-icon {
      color: #4CAF50;
      font-size: 90px;
      margin-bottom: 15px;
    }

    .message {
      font-size: 14pt;
      text-align: center;
      margin-bottom: 20px;
    }

    .inline-error {
      width: 100%;
      color: #b00020;
      font-size: 11pt;
      text-align: left;
      margin-top: 10px;
      display: none;
    }

    .inline-error.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Vue numéro initial -->
    <div id="invoiceNumberView" class="popup-view invoice-number-view">
      <div class="message-title">Numéro de facture</div>
      <div class="message-sub">Par quel numéro de facture doit-on commencer?</div>
      <div class="label invoice-number-label">Numéro</div>
      <input type="number" id="initialNumber" inputmode="numeric" min="1" step="1" oninput="validateInitialInvoiceNumber()">
      <div id="invoiceNumberError" class="inline-error" aria-live="polite"></div>
    </div>
    <!-- Vue confirmation -->
    <div id="confirmView" class="popup-view confirm-view">
      <div class="message-title" id="confirmTitle"></div>
      <div class="message-sub" id="confirmMessage"></div>
    </div>
    <!-- Vue message -->
    <div id="messageView" class="popup-view message-view">
      <div class="message-title" id="messageViewTitle"></div>
      <div class="message-sub" id="messageViewMessage"></div>
    </div>
    <!-- Formulaire initial -->
    <div id="formView" class="popup-view form-view active">
      <div class="label">Contact :</div>
      <select id="contact" onchange="validateForm()">
        <option>Sélectionnez un contact</option>
        <option>Autre</option>
      </select>
      <input type="text" id="newContact" placeholder="Entrez un nouveau contact" style="display:none;" oninput="validateForm()">
      <div class="label activity-label">Type d’activité générale :</div>
      <select id="activityType" onchange="validateForm()">
        <option>Sélectionnez une activité</option>
        <option>Autre</option>
      </select>
      <input type="text" id="newActivityType" placeholder="Entrez une nouvelle activité" style="display:none;" oninput="validateForm()">
    </div>
    <!-- État de chargement -->
    <div id="loadingView" class="popup-view status-view">
      <div class="loading-spinner"></div>
      <div class="message-title">Création de la facture</div>
      <div class="message-sub">Veuillez patienter...</div>
    </div>
    <!-- État de succès -->
    <div id="successView" class="popup-view status-view">
      <i class="fas fa-check-circle success-icon"></i>
      <div class="message">Facture créée avec succès !</div>
    </div>
    <!-- État d'erreur -->
    <div id="errorView" class="popup-view error-view">
      <div class="message" id="errorMessage"></div>
    </div>
    <!-- Pied de page -->
    <div class="footer">
      <button id="submit" class="btn btn-green" disabled onclick="handlePrimaryAction()">Générer la facture</button>
      <button id="close" class="btn btn-white" style="display:none;" onclick="handleSecondaryAction()">Fermer</button>
      <button id="openPdf" class="btn btn-green" style="display:none;" onclick="openPdfAndClose()">Ouvrir le PDF</button>
    </div>
  </div>

  <script>
    let pdfUrl = '';
    let currentPrimaryAction = null;
    let currentSecondaryAction = null;
    let pendingInvoiceSubmission = null;
    const popupViewIds = ["invoiceNumberView", "confirmView", "messageView", "formView", "loadingView", "successView", "errorView"];
    if (typeof window.contacts === "undefined") {
      window.contacts = [];
    }
    if (typeof window.activityTypes === "undefined") {
      window.activityTypes = [];
    }
    if (typeof window.initialInvoiceNumber === "undefined") {
      window.initialInvoiceNumber = null;
    }
    if (typeof window.requiresInitialInvoiceSetup === "undefined") {
      window.requiresInitialInvoiceSetup = false;
    }
    if (typeof window.showStartupConfirm === "undefined") {
      window.showStartupConfirm = false;
    }
    if (typeof window.confirmViewTitle === "undefined") {
      window.confirmViewTitle = "";
    }
    if (typeof window.confirmViewMessage === "undefined") {
      window.confirmViewMessage = "";
    }
    if (typeof window.confirmAction === "undefined") {
      window.confirmAction = "";
    }
    if (typeof window.confirmPrimaryLabel === "undefined") {
      window.confirmPrimaryLabel = "";
    }
    if (typeof window.confirmSecondaryLabel === "undefined") {
      window.confirmSecondaryLabel = "";
    }
    if (typeof window.showStandaloneMessage === "undefined") {
      window.showStandaloneMessage = false;
    }
    if (typeof window.messageViewTitle === "undefined") {
      window.messageViewTitle = "";
    }
    if (typeof window.messageViewMessage === "undefined") {
      window.messageViewMessage = "";
    }

    function setActiveView(viewId) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle("active", id === viewId);
      });
    }

    function setFooterButtons({ submit, openPdf, close, submitLabel, closeLabel }) {
      document.getElementById("submit").style.display = submit;
      document.getElementById("openPdf").style.display = openPdf;
      document.getElementById("close").style.display = close;
      if (typeof submitLabel !== "undefined") {
        document.getElementById("submit").textContent = submitLabel;
      }
      if (typeof closeLabel !== "undefined") {
        document.getElementById("close").textContent = closeLabel;
      }
    }

    function handlePrimaryAction() {
      if (typeof currentPrimaryAction === "function") {
        currentPrimaryAction();
      }
    }

    function handleSecondaryAction() {
      if (typeof currentSecondaryAction === "function") {
        currentSecondaryAction();
      }
    }

    function showInvoiceNumberInlineError(message) {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = message;
      errorElement.classList.add("active");
    }

    function clearInvoiceNumberInlineError() {
      const errorElement = document.getElementById("invoiceNumberError");
      errorElement.textContent = "";
      errorElement.classList.remove("active");
    }

    function validateInitialInvoiceNumber() {
      const initialNumberInput = document.getElementById("initialNumber");
      const isValid = /^\d+$/.test(initialNumberInput.value.trim());
      initialNumberInput.classList.toggle("invalid", !isValid);
      if (!isValid) {
        showInvoiceNumberInlineError("Veuillez saisir un numéro valide.");
      } else {
        clearInvoiceNumberInlineError();
      }
      return isValid;
    }

    function submitInitialInvoiceNumber() {
      if (!validateInitialInvoiceNumber()) return;
      window.initialInvoiceNumber = Number(document.getElementById("initialNumber").value.trim());
      clearInvoiceNumberInlineError();
      showFormView();
      validateForm();
    }

    function handleConfirmAction(action, confirmed) {
      if (action === "delete_rows") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .withFailureHandler(error => {
            showErrorView(error && error.message ? error.message : null);
          })
          .supprimerLignesCochées();
        return;
      }

      if (action === "facturer_continue") {
        if (!confirmed) {
          google.script.host.close();
          return;
        }
        if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
          showInvoiceNumberView();
        } else {
          showFormView();
          validateForm();
        }
        return;
      }

      if (action === "replace_pdf") {
        if (!confirmed) {
          pendingInvoiceSubmission = null;
          showFormView();
          validateForm();
          return;
        }
        if (!pendingInvoiceSubmission) {
          showErrorView(null);
          return;
        }
        submitInvoiceRequest(pendingInvoiceSubmission, true);
        return;
      }

      google.script.host.close();
    }

    function showConfirmView({ title, message, action, confirmLabel, cancelLabel }) {
      document.getElementById("confirmTitle").textContent = title;
      document.getElementById("confirmMessage").textContent = message;
      document.getElementById("errorMessage").textContent = "";
      setActiveView("confirmView");
      setFooterButtons({
        submit: "block",
        openPdf: "none",
        close: "block",
        submitLabel: confirmLabel || "Confirmer",
        closeLabel: cancelLabel || "Annuler"
      });
      document.getElementById("submit").disabled = false;
      currentPrimaryAction = () => handleConfirmAction(action, true);
      currentSecondaryAction = () => handleConfirmAction(action, false);
    }

    function showMessageView({ title, message }) {
      const safeTitle = typeof title === "string" && title.trim() !== "" ? title : "Information";
      const safeMessage = typeof message === "string" && message.trim() !== ""
        ? message
        : "Une erreur est survenue.";
      document.getElementById("messageViewTitle").textContent = safeTitle;
      document.getElementById("messageViewMessage").textContent = safeMessage;
      document.getElementById("errorMessage").textContent = "";
      setActiveView("messageView");
      setFooterButtons({
        submit: "none",
        openPdf: "none",
        close: "block",
        closeLabel: "Fermer"
      });
      currentPrimaryAction = null;
      currentSecondaryAction = () => google.script.host.close();
    }

    // Remplir les menus déroulants avec les données injectées
    function populateDropdowns() {
      const contactSelect = document.getElementById("contact");
      const activityTypeSelect = document.getElementById("activityType");

      // Vider les options existantes sauf les par défaut
      while (contactSelect.options.length > 2) contactSelect.remove(1);
      while (activityTypeSelect.options.length > 2) activityTypeSelect.remove(1);

      // Ajouter les contacts
      if (contacts && Array.isArray(contacts)) {
        contacts.forEach(contact => {
          const option = document.createElement("option");
          option.text = contact;
          option.value = contact;
          contactSelect.add(option, contactSelect.options[contactSelect.options.length - 1]);
        });
      }

      // Ajouter les types d'activité
      if (activityTypes && Array.isArray(activityTypes)) {
        activityTypes.forEach(activity => {
          const option = document.createElement("option");
          option.text = activity;
          option.value = activity;
          activityTypeSelect.add(option, activityTypeSelect.options[activityTypeSelect.options.length - 1]);
        });
      }

      // Sélectionner automatiquement la deuxième option
      contactSelect.selectedIndex = contactSelect.options.length > 1 ? 1 : 0;
      activityTypeSelect.selectedIndex = activityTypeSelect.options.length > 1 ? 1 : 0;

    }

    function validateForm() {
      const contactSelect = document.getElementById("contact");
      const newContact = document.getElementById("newContact");
      const activitySelect = document.getElementById("activityType");
      const newActivityType = document.getElementById("newActivityType");
      const submitBtn = document.getElementById("submit");

      // Afficher/masquer les champs "Autre"
      newContact.style.display = contactSelect.value === "Autre" ? "block" : "none";
      newActivityType.style.display = activitySelect.value === "Autre" ? "block" : "none";

      // Valider les champs
      const isContactValid = contactSelect.value !== "Sélectionnez un contact" && 
        (contactSelect.value !== "Autre" || (newContact.value.trim() !== ""));
      const isActivityValid = activitySelect.value !== "Sélectionnez une activité" && 
        (activitySelect.value !== "Autre" || (newActivityType.value.trim() !== ""));

      contactSelect.classList.toggle("invalid", !isContactValid);
      newContact.classList.toggle("invalid", contactSelect.value === "Autre" && newContact.value.trim() === "");
      activitySelect.classList.toggle("invalid", !isActivityValid);
      newActivityType.classList.toggle("invalid", activitySelect.value === "Autre" && newActivityType.value.trim() === "");

      submitBtn.disabled = !(isContactValid && isActivityValid);
    }

    function showFormView() {
      document.getElementById("errorMessage").textContent = "";
      setActiveView("formView");
      setFooterButtons({ submit: "block", openPdf: "none", close: "none", submitLabel: "Générer la facture", closeLabel: "Fermer" });
      currentPrimaryAction = submit;
      currentSecondaryAction = () => google.script.host.close();
    }

    function showInvoiceNumberView() {
      clearInvoiceNumberInlineError();
      document.getElementById("errorMessage").textContent = "";
      setActiveView("invoiceNumberView");
      setFooterButtons({ submit: "block", openPdf: "none", close: "none", submitLabel: "OK", closeLabel: "Fermer" });
      document.getElementById("submit").disabled = false;
      currentPrimaryAction = submitInitialInvoiceNumber;
      currentSecondaryAction = () => google.script.host.close();
      document.getElementById("initialNumber").focus();
    }

    function showLoadingView() {
      document.getElementById("errorMessage").textContent = "";
      setActiveView("loadingView");
      setFooterButtons({ submit: "none", openPdf: "none", close: "none" });
      currentPrimaryAction = null;
      currentSecondaryAction = null;
    }

    function showSuccessView() {
      document.getElementById("errorMessage").textContent = "";
      setActiveView("successView");
      setFooterButtons({ submit: "none", openPdf: "block", close: "block", closeLabel: "Fermer" });
      currentPrimaryAction = null;
      currentSecondaryAction = () => google.script.host.close();
    }

    function showErrorView(message) {
      const safeMessage = typeof message === "string" && message.trim() !== ""
        ? message
        : "Une erreur est survenue.";
      pdfUrl = "";
      document.getElementById("errorMessage").textContent = safeMessage;
      setActiveView("errorView");
      setFooterButtons({ submit: "none", openPdf: "none", close: "block", closeLabel: "Retour" });
      currentPrimaryAction = null;
      currentSecondaryAction = showFormView;
    }

    function openPdfAndClose() {
      window.open(pdfUrl, '_blank');
      google.script.host.close();
    }

    function submitInvoiceRequest(submissionData, overwriteExistingFile) {
      showLoadingView();

      google.script.run
        .withSuccessHandler(result => {
          if (result.success) {
            pendingInvoiceSubmission = null;
            pdfUrl = result.pdfUrl;
            showSuccessView();
          } else if (result.requiresConfirmation && result.confirmAction === "replace_pdf") {
            pendingInvoiceSubmission = submissionData;
            showConfirmView({
              title: result.confirmTitle,
              message: result.message,
              action: result.confirmAction,
              confirmLabel: result.confirmPrimaryLabel,
              cancelLabel: result.confirmSecondaryLabel
            });
          } else {
            pendingInvoiceSubmission = null;
            showErrorView(result.message);
          }
        })
        .withFailureHandler(error => {
          pendingInvoiceSubmission = null;
          showErrorView(error && error.message ? `Erreur inattendue : ${error.message}` : null);
        })
        .submitFacturerForm(submissionData.contact, submissionData.activityType, window.initialInvoiceNumber, overwriteExistingFile);
    }

    function submit() {
      const contact = document.getElementById("contact").value === "Autre" ? 
        document.getElementById("newContact").value.trim() : 
        document.getElementById("contact").value;
      const activityType = document.getElementById("activityType").value === "Autre" ? 
        document.getElementById("newActivityType").value.trim() : 
        document.getElementById("activityType").value;

      pendingInvoiceSubmission = { contact, activityType };
      submitInvoiceRequest(pendingInvoiceSubmission, false);
    }

    // Remplir les menus déroulants au chargement
    document.addEventListener("DOMContentLoaded", () => {
      populateDropdowns();
      if (window.showStartupConfirm) {
        showConfirmView({
          title: window.confirmViewTitle,
          message: window.confirmViewMessage,
          action: window.confirmAction,
          confirmLabel: window.confirmPrimaryLabel,
          cancelLabel: window.confirmSecondaryLabel
        });
      } else if (window.showStandaloneMessage) {
        showMessageView({
          title: window.messageViewTitle,
          message: window.messageViewMessage
        });
      } else if (window.initialInvoiceNumber === null && window.requiresInitialInvoiceSetup) {
        showInvoiceNumberView();
      } else {
        showFormView();
        validateForm();
      }
    });
  </script>
</body>
</html>
