<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --field-gap: 15px;
      --control-height: 52px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Roboto, sans-serif; }

    .container {
      margin: 0;
      padding: 10px 0 0 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Base visuelle commune : ces types restent compatibles avec la structure
       propre à popupTemps, mais l'alignent avec les autres popups du projet. */
    .container[class*="popup-type-"] .popup-view.active {
      width: 100%;
      align-self: center;
      margin: 0;
      padding: 0;
    }

    .popup-type-alert .popup-view.active {
      max-width: 380px;
    }

    .popup-type-confirm .popup-view.active {
      max-width: 400px;
    }

    .popup-type-form-simple .popup-view.active {
      max-width: 420px;
    }

    .popup-type-form-complex .popup-view.active {
      max-width: 840px;
    }

    .popup-type-action .popup-view.active {
      max-width: 420px;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .popup-view.active {
      display: flex;
    }

    .form-view {
      justify-content: flex-start;
      padding-bottom: 88px;
    }

    #formView.form-view {
      padding-bottom: 0;
    }

    #formView .form-container {
      flex: 0 0 auto;
      overflow: visible;
    }

    .status-view {
      justify-content: flex-start;
      padding-top: 75px;
    }

    .error-view {
      justify-content: flex-start;
      padding-top: 60px;
    }

    .form-container {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--field-gap);
      justify-content: flex-start;
      align-items: stretch;
      overflow-y: auto;
      padding: 0;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #000000;
      border-radius: 7px;
      font-size: calc(13pt + 2px);
      line-height: 1.2;
      color: #000;
      background: #fff;
    }

    select, input {
      height: var(--control-height);
    }

    textarea {
      resize: none;
    }

    select:disabled, input:disabled, textarea:disabled {
      border: 1px solid #f7f7f7;
      color: #9a9a9a;
      background: #f7f7f7;
    }

    input::placeholder, textarea::placeholder {
      color: #c8c8c8;
      opacity: 1;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 42px;
      color: #000000;
      background-image:
        linear-gradient(45deg, transparent 50%, #000000 50%),
        linear-gradient(135deg, #000000 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% + 1px),
        calc(100% - 14px) calc(50% + 1px);
      background-size: 10px 10px, 10px 10px;
      background-repeat: no-repeat;
    }

    select.is-placeholder {
      color: #c8c8c8;
    }

    select option:not([value=""]) { color: #000000; }
    select option[value=""] { color: #c8c8c8; }
    select.invalid, input.invalid, textarea.invalid { border: 1px solid #ff0000; }

    .field-block {
      width: 100%;
      margin-bottom: 0;
    }

    .inline-field {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
    }

    .inline-field input {
      flex: 1;
    }

    .inline-warning {
      display: none;
      margin-top: 0;
      font-size: 9pt;
      color: #c62828;
    }

    .inline-warning:not(:empty) {
      display: block;
      margin-top: 4px;
    }

    .icon-btn {
      width: 34px;
      min-width: 34px;
      height: 34px;
      border: 1px solid #ccc;
      background: #fff;
      color: #666;
      cursor: pointer;
      font-size: 14px;
    }

    .icon-btn:hover {
      background: #f3f3f3;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      background: #fff;
    }

    .rate-container {
      display: flex;
      flex-direction: column;
      padding: 0;
      width: 100%;
    }

    .btn-container {
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      margin-left: 20px;
      min-height: var(--control-height);
      padding: 0 28px;
      border-radius: 7px;
      cursor: pointer;
      border: none;
      font-size: 23px;
      line-height: 1;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-green {
      background-color: #00983a;
      color: white;
      border: 1px solid #00983a;
    }

    .btn-green:hover {
      background-color: #1ecc00;
      border: 1px solid #1ecc00;
    }

    .btn-secondary {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #898989;
    }

    .btn-secondary:hover {
      background-color: #ffffff;
      border: 1px solid #000000;
    }

    .btn:disabled {
      background-color: #efefef;
      border: 1px solid #efefef;
      color: #ffffff;
      cursor: not-allowed;
    }

    .spinner {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #4CAF50;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin: 20px 0 5px 0;
    }

    .message-sub {
      font-size: 14pt;
      text-align: center;
    }

    .success-icon {
      color: #4CAF50;
      font-size: 90px;
      margin-bottom: 15px;
    }

    .error-actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    .new-client-layout {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--field-gap);
      padding-bottom: 88px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .time-entry-layout {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .time-entry-column {
      display: flex;
      flex-direction: column;
      gap: var(--field-gap);
      min-width: 0;
    }

    .time-entry-rate-row {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: var(--control-height);
    }

    .time-entry-rate-label {
      font-size: calc(13pt + 2px);
      line-height: 1.2;
      color: #000000;
      white-space: nowrap;
    }

    .time-entry-note {
      height: calc(var(--control-height) + var(--control-height) + var(--field-gap));
      min-height: calc(var(--control-height) + var(--control-height) + var(--field-gap));
    }

    .time-entry-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
      min-height: var(--control-height);
    }

    .time-entry-actions .btn {
      width: 100%;
      height: 100%;
      margin-left: 0;
      padding: 0 24px;
    }

  </style>
</head>
<body>
  <div id="popupContainer" class="container">
    <div id="formView" class="popup-view form-view active">
      <div id="formContainer" class="form-container">
        <div class="time-entry-layout">
          <div class="time-entry-column">
            <div class="field-block">
              <select id="clientSelect" onchange="handleClientChange()"></select>
            </div>

            <div class="field-block">
              <div id="campaignSelectWrapper">
                <select id="campaign" onchange="handleCampaignInput()"></select>
              </div>
              <div id="campaignCustomWrapper" class="inline-field" style="display:none;">
                <input type="text" id="customCampaign" placeholder="Entrez une campagne" oninput="handleCustomFieldInput('campaign')">
                <button type="button" class="icon-btn" onclick="closeCustomField('campaign')">X</button>
              </div>
              <div id="campaignExistsMessage" class="inline-warning"></div>
            </div>

            <div class="field-block">
              <div id="projectSelectWrapper">
                <select id="project" onchange="handleProjectChange()"></select>
              </div>
              <div id="projectCustomWrapper" class="inline-field" style="display:none;">
                <input type="text" id="customProject" placeholder="Entrez un projet" oninput="handleCustomFieldInput('project')">
                <button type="button" class="icon-btn" onclick="closeCustomField('project')">X</button>
              </div>
              <div id="projectExistsMessage" class="inline-warning"></div>
            </div>

            <div class="field-block">
              <div id="activitySelectWrapper">
                <select id="activitySelect" onchange="handleActivityChange()"></select>
              </div>
              <div id="activityCustomWrapper" class="inline-field" style="display:none;">
                <input type="text" id="customActivity" placeholder="Entrez une activité" oninput="handleCustomFieldInput('activity')">
                <button type="button" class="icon-btn" onclick="closeCustomField('activity')">X</button>
              </div>
              <div id="activityExistsMessage" class="inline-warning"></div>
            </div>
          </div>

          <div class="time-entry-column time-entry-right-column">
            <div class="time-entry-rate-row">
              <div class="time-entry-rate-label">Taux horaire :</div>
              <div class="rate-container">
                <div id="rateSelectWrapper">
                  <select id="rate"></select>
                </div>
                <div id="rateCustomWrapper" class="inline-field" style="display:none; margin-top: 0;">
                  <input type="text" id="customRate" placeholder="Entrez un taux" oninput="handleCustomFieldInput('rate')">
                  <button type="button" class="icon-btn" onclick="closeCustomField('rate')">X</button>
                </div>
                <div id="rateExistsMessage" class="inline-warning"></div>
              </div>
            </div>

            <div class="field-block">
              <textarea id="note" class="time-entry-note" placeholder="Note" oninput="updateLiveValidation()"></textarea>
            </div>

            <div class="time-entry-actions">
              <button class="btn btn-secondary" onclick="google.script.host.close()">Fermer</button>
              <button id="submit" class="btn btn-green" onclick="submitForm()">OK</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="newClientView" class="popup-view form-view">
      <div class="form-container">
        <div class="message-title">Nouveau client</div>
        <div class="new-client-layout">
          <div class="field-block full-width">
            <input type="text" id="clientCompanyName" placeholder="Nom de l’entreprise" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="text" id="clientPrimaryContactName" placeholder="Nom du contact principal" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="email" id="clientPrimaryContactEmail" placeholder="Courriel du contact principal" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="text" id="clientSecondaryContactName" placeholder="Contact secondaire" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="email" id="clientSecondaryContactEmail" placeholder="Courriel secondaire" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="text" id="clientBillingContactName" placeholder="Contact facturation" oninput="updateNewClientValidation()">
          </div>

          <div class="field-block">
            <input type="email" id="clientBillingEmail" placeholder="Courriel facturation" oninput="updateNewClientValidation()">
          </div>
        </div>
      </div>

      <div class="footer">
        <div></div>
        <div class="btn-container">
          <button class="btn btn-secondary" onclick="cancelNewClientView()">Retour</button>
          <button class="btn btn-green" onclick="saveNewClientView()">OK</button>
        </div>
      </div>
    </div>

    <div id="loadingView" class="popup-view status-view">
      <div class="spinner"></div>
      <div class="message-title">Création de l'entrée</div>
      <div class="message-sub">Veuillez patienter...</div>
    </div>

    <div id="successView" class="popup-view status-view">
      <i class="fas fa-check-circle success-icon"></i>
      <div class="message-title">Entrée créée</div>
      <div class="message-sub">Fermeture en cours...</div>
    </div>

    <div id="errorView" class="popup-view error-view">
      <div class="message-title">Attention</div>
      <div class="message-sub" id="errorMessage"></div>
      <div class="error-actions">
        <button class="btn btn-green" onclick="google.script.host.close()">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    let clientOptions = <?!= JSON.stringify(Array.isArray(clients) ? clients : []) ?>;
    let campaignOptionsByClient = <?!= JSON.stringify(campaignOptionsByClient || {}) ?>;
    let projectOptionsByClientAndCampaign = <?!= JSON.stringify(projectOptionsByClientAndCampaign || {}) ?>;
    let activityOptions = <?!= JSON.stringify(Array.isArray(activities) ? activities : []) ?>;
    let rateOptions = <?!= JSON.stringify(rates || ['0']) ?>;
    if (!Array.isArray(rateOptions)) rateOptions = ['0'];

    const initialClientSelected = <?!= JSON.stringify(typeof clientSelected === 'string' ? clientSelected : '') ?>;
    const initialCampaignSelected = <?!= JSON.stringify(typeof campaign === 'string' ? campaign : '') ?>;
    const initialProjectSelected = <?!= JSON.stringify(typeof project === 'string' ? project : '') ?>;
    const initialActivitySelected = <?!= JSON.stringify(typeof activitySelected === 'string' ? activitySelected : '') ?>;

    /* popupTemps reste un popup autonome, mais on lui donne la même notion
       de catégories que popup.html pour converger vers une architecture UI
       commune sans réécrire son flux complexe. */
    const popupTypeClasses = [
      'popup-type-alert',
      'popup-type-confirm',
      'popup-type-form-simple',
      'popup-type-form-complex',
      'popup-type-action'
    ];
    const popupTypeByView = {
      formView: 'form-complex',
      newClientView: 'form-complex',
      loadingView: 'action',
      successView: 'action',
      errorView: 'alert'
    };
    const popupViewIds = ['formView', 'newClientView', 'loadingView', 'successView', 'errorView'];
    let isSubmitting = false;
    let pendingNewClientData = null;
    let previousClientValue = '';
    let formValidationActivated = false;
    let newClientValidationActivated = false;

    function getFieldRefs() {
      return {
        clientSelect: document.getElementById('clientSelect'),
        campaign: document.getElementById('campaign'),
        project: document.getElementById('project'),
        activitySelect: document.getElementById('activitySelect'),
        note: document.getElementById('note'),
        rateSelect: document.getElementById('rate'),
        customCampaign: document.getElementById('customCampaign'),
        customProject: document.getElementById('customProject'),
        customActivity: document.getElementById('customActivity'),
        customRate: document.getElementById('customRate'),
        submit: document.getElementById('submit')
      };
    }

    /* Applique le type au conteneur actif.
       Si aucun type explicite n'est fourni, on retombe sur le mapping par vue,
       ce qui préserve le comportement existant tout en classant le popup. */
    function applyPopupType(type) {
      const popupContainer = document.getElementById('popupContainer');
      popupTypeClasses.forEach(className => {
        popupContainer.classList.remove(className);
      });

      if (typeof type !== 'string' || type.trim() === '') {
        return;
      }

      const normalizedType = `popup-type-${type.trim()}`;
      if (popupTypeClasses.includes(normalizedType)) {
        popupContainer.classList.add(normalizedType);
      }
    }

    function resolvePopupType(viewId, type) {
      if (typeof type === 'string' && type.trim() !== '') {
        return type.trim();
      }
      return popupTypeByView[viewId] || '';
    }

    function setActiveView(viewId, type) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle('active', id === viewId);
      });
      applyPopupType(resolvePopupType(viewId, type));
      syncPopupSize(viewId);
    }

    function syncPopupSize(viewId) {
      if (typeof google === 'undefined' || !google.script || !google.script.host) {
        return;
      }

      const dimensionsByView = {
        formView: { width: 690, height: 340 },
        newClientView: { width: 690, height: 560 },
        loadingView: { width: 460, height: 260 },
        successView: { width: 460, height: 260 },
        errorView: { width: 460, height: 260 }
      };
      const dimensions = dimensionsByView[viewId];
      if (!dimensions) {
        return;
      }

      google.script.host.setWidth(dimensions.width);
      google.script.host.setHeight(dimensions.height);
    }

    function setSubmitDisabled(disabled) {
      getFieldRefs().submit.disabled = disabled;
    }

    function showFormView() {
      isSubmitting = false;
      setSubmitDisabled(false);
      setActiveView('formView', 'form-complex');
    }

    function showNewClientView() {
      setActiveView('newClientView', 'form-complex');
      document.getElementById('clientCompanyName').focus();
    }

    function showLoadingView() {
      setSubmitDisabled(true);
      setActiveView('loadingView', 'action');
    }

    function showSuccessView() {
      setSubmitDisabled(true);
      setActiveView('successView', 'action');
    }

    function showErrorView(message) {
      const safeMessage = typeof message === 'string' && message.trim() !== ''
        ? message
        : "Une erreur est survenue.";
      isSubmitting = false;
      setSubmitDisabled(false);
      document.getElementById('errorMessage').textContent = safeMessage;
      setActiveView('errorView', 'alert');
    }

    function normalizeOptionValue(value) {
      return String(value || '').trim().toLowerCase();
    }

    function isCustomFieldActive(fieldName) {
      return document.getElementById(`${fieldName}CustomWrapper`).style.display !== 'none';
    }

    function getCurrentClientValue() {
      const { clientSelect } = getFieldRefs();
      if (clientSelect.value === '__new_client__' && pendingNewClientData) {
        return pendingNewClientData.companyName;
      }
      return clientSelect.value;
    }

    function getCurrentCampaignValue() {
      const { campaign, customCampaign } = getFieldRefs();
      return isCustomFieldActive('campaign') ? customCampaign.value.trim() : campaign.value;
    }

    function updateSelectPlaceholderState(selectElement) {
      if (!selectElement) return;
      selectElement.classList.toggle('is-placeholder', selectElement.value === '');
    }

    function getExistingOptionsForField(fieldName) {
      if (fieldName === 'campaign') {
        return campaignOptionsByClient[getCurrentClientValue()] || [];
      }
      if (fieldName === 'project') {
        const projectKey = `${getCurrentClientValue()}|||${getCurrentCampaignValue()}`;
        return projectOptionsByClientAndCampaign[projectKey] || [];
      }
      if (fieldName === 'activity') {
        return activityOptions.filter(option => option !== '0');
      }
      if (fieldName === 'rate') {
        return rateOptions.filter(option => String(option) !== '0');
      }
      return [];
    }

    function updateDuplicateMessage(fieldName) {
      const input = document.getElementById(`custom${fieldName.charAt(0).toUpperCase() + fieldName.slice(1)}`);
      const message = document.getElementById(`${fieldName}ExistsMessage`);
      const existingOptions = getExistingOptionsForField(fieldName);
      const value = normalizeOptionValue(input.value);
      const exists = value !== '' && existingOptions.some(option => normalizeOptionValue(option) === value);
      message.textContent = exists ? 'Existe déjà' : '';
    }

    function clearDuplicateMessage(fieldName) {
      document.getElementById(`${fieldName}ExistsMessage`).textContent = '';
    }

    function setSelectOptions(selectElement, options, placeholder, selectedValue, includeOtherOption) {
      selectElement.innerHTML = '';

      const placeholderOption = document.createElement('option');
      placeholderOption.value = '';
      placeholderOption.text = placeholder;
      selectElement.appendChild(placeholderOption);

      options.forEach(optionValue => {
        const option = document.createElement('option');
        option.value = optionValue;
        option.text = optionValue;
        selectElement.appendChild(option);
      });

      if (includeOtherOption) {
        const otherOption = document.createElement('option');
        otherOption.value = '__autre__';
        otherOption.text = 'Autre...';
        selectElement.appendChild(otherOption);
      }

      selectElement.value = selectedValue;
      if (selectElement.value !== selectedValue) {
        selectElement.value = '';
      }
      updateSelectPlaceholderState(selectElement);
    }

    function populateClientOptions(selectedValue = '') {
      const { clientSelect } = getFieldRefs();
      clientSelect.innerHTML = '';

      const placeholderOption = document.createElement('option');
      placeholderOption.value = '';
      placeholderOption.text = 'Client';
      clientSelect.appendChild(placeholderOption);

      const renderedClients = [...clientOptions];
      if (pendingNewClientData && pendingNewClientData.companyName) {
        renderedClients.unshift(pendingNewClientData.companyName);
      }

      const uniqueRenderedClients = [...new Set(renderedClients)];
      uniqueRenderedClients.forEach(client => {
        const option = document.createElement('option');
        option.value = pendingNewClientData && client === pendingNewClientData.companyName ? '__new_client__' : client;
        option.text = client;
        clientSelect.appendChild(option);
      });

      const otherOption = document.createElement('option');
      otherOption.value = '__autre__';
      otherOption.text = 'Autre...';
      clientSelect.appendChild(otherOption);

      clientSelect.value = selectedValue;
      if (clientSelect.value !== selectedValue) {
        clientSelect.value = '';
      }
      updateSelectPlaceholderState(clientSelect);
    }

    function populateCampaignOptions(selectedValue = '') {
      const { campaign } = getFieldRefs();
      const currentClientValue = getCurrentClientValue();
      const hasClient = currentClientValue !== '';
      const options = campaignOptionsByClient[currentClientValue] || [];
      setSelectOptions(
        campaign,
        options,
        'Campagne',
        selectedValue,
        hasClient
      );
      campaign.disabled = !hasClient;
    }

    function populateProjectOptions(selectedValue = '') {
      const { project } = getFieldRefs();
      const currentClientValue = getCurrentClientValue();
      const currentCampaignValue = getCurrentCampaignValue();
      const hasClientAndCampaign = currentClientValue !== '' && currentCampaignValue !== '' && currentCampaignValue !== '__autre__';
      const projectKey = `${currentClientValue}|||${currentCampaignValue}`;
      const options = projectOptionsByClientAndCampaign[projectKey] || [];
      setSelectOptions(
        project,
        options,
        'Projet',
        selectedValue,
        hasClientAndCampaign
      );
      project.disabled = !hasClientAndCampaign;
    }

    function populateActivityOptions(selectedValue = '') {
      const { activitySelect } = getFieldRefs();
      setSelectOptions(
        activitySelect,
        activityOptions,
        'Activité',
        selectedValue,
        true
      );
    }

    function initializeRateOptions(selectedValue = '') {
      const { rateSelect } = getFieldRefs();
      const rateValues = rateOptions.filter(rate => String(rate) !== '0');
      setSelectOptions(
        rateSelect,
        rateValues,
        'Taux',
        selectedValue,
        true
      );
      rateSelect.addEventListener('change', handleRateChange);
    }

    function clearValidationState() {
      const fields = [
        'clientSelect',
        'campaign',
        'project',
        'activitySelect',
        'note',
        'rate',
        'customCampaign',
        'customProject',
        'customActivity',
        'customRate',
        'clientCompanyName',
        'clientPrimaryContactName',
        'clientPrimaryContactEmail',
        'clientSecondaryContactName',
        'clientSecondaryContactEmail',
        'clientBillingContactName',
        'clientBillingEmail'
      ];
      fields.forEach(id => {
        const field = document.getElementById(id);
        if (field) field.classList.remove('invalid');
      });
    }

    function updateLiveValidation() {
      const {
        clientSelect,
        campaign,
        project,
        activitySelect,
        note,
        rateSelect,
        customCampaign,
        customProject,
        customActivity,
        customRate
      } = getFieldRefs();

      const isClientValid = clientSelect.value !== '' && clientSelect.value !== '__autre__';
      const isCampaignValid = isCustomFieldActive('campaign')
        ? customCampaign.value.trim() !== ''
        : campaign.value !== '' && campaign.value !== '__autre__';
      const isProjectValid = isCustomFieldActive('project')
        ? customProject.value.trim() !== ''
        : project.value !== '' && project.value !== '__autre__';
      const isActivityValid = isCustomFieldActive('activity')
        ? customActivity.value.trim() !== ''
        : activitySelect.value !== '' && activitySelect.value !== '__autre__';
      const isRateValid = isCustomFieldActive('rate')
        ? /^\d+$/.test(customRate.value.trim())
        : rateSelect.value !== '' && rateSelect.value !== '__autre__';
      const isNoteValid = note.value.trim() !== '';

      updateSelectPlaceholderState(clientSelect);
      updateSelectPlaceholderState(campaign);
      updateSelectPlaceholderState(project);
      updateSelectPlaceholderState(activitySelect);
      updateSelectPlaceholderState(rateSelect);

      if (!formValidationActivated) {
        return;
      }

      clientSelect.classList.toggle('invalid', !isClientValid);
      campaign.classList.toggle('invalid', !isCustomFieldActive('campaign') && !isCampaignValid);
      customCampaign.classList.toggle('invalid', isCustomFieldActive('campaign') && !isCampaignValid);
      project.classList.toggle('invalid', !isCustomFieldActive('project') && !isProjectValid);
      customProject.classList.toggle('invalid', isCustomFieldActive('project') && !isProjectValid);
      activitySelect.classList.toggle('invalid', !isCustomFieldActive('activity') && !isActivityValid);
      customActivity.classList.toggle('invalid', isCustomFieldActive('activity') && !isActivityValid);
      rateSelect.classList.toggle('invalid', !isCustomFieldActive('rate') && !isRateValid);
      customRate.classList.toggle('invalid', isCustomFieldActive('rate') && !isRateValid);
      note.classList.toggle('invalid', !isNoteValid);
    }

    function updateNewClientValidation() {
      if (!newClientValidationActivated) {
        return;
      }
      const requiredIds = ['clientCompanyName', 'clientPrimaryContactName', 'clientPrimaryContactEmail'];
      requiredIds.forEach(id => {
        const field = document.getElementById(id);
        field.classList.toggle('invalid', field.value.trim() === '');
      });
    }

    function openCustomField(fieldName) {
      document.getElementById(`${fieldName}SelectWrapper`).style.display = 'none';
      document.getElementById(`${fieldName}CustomWrapper`).style.display = 'flex';
      clearDuplicateMessage(fieldName);
      document.getElementById(`custom${fieldName.charAt(0).toUpperCase() + fieldName.slice(1)}`).focus();
      updateLiveValidation();
    }

    function closeCustomField(fieldName) {
      document.getElementById(`${fieldName}CustomWrapper`).style.display = 'none';
      document.getElementById(`${fieldName}SelectWrapper`).style.display = 'block';
      const input = document.getElementById(`custom${fieldName.charAt(0).toUpperCase() + fieldName.slice(1)}`);
      input.value = '';
      clearDuplicateMessage(fieldName);
      const select = document.getElementById(fieldName === 'activity' ? 'activitySelect' : fieldName === 'rate' ? 'rate' : fieldName);
      select.value = '';
      updateLiveValidation();
    }

    function handleCustomFieldInput(fieldName) {
      updateDuplicateMessage(fieldName);
      updateLiveValidation();
    }

    function updateDependencyState(options = {}) {
      const { selectedCampaign = '', selectedProject = '' } = options;
      populateCampaignOptions(selectedCampaign);
      populateProjectOptions(selectedProject);
      if (!selectedCampaign) {
        closeCustomField('campaign');
      }
      if (!selectedProject) {
        closeCustomField('project');
      }
    }

    function handleClientChange() {
      const { clientSelect } = getFieldRefs();
      if (clientSelect.value === '__autre__') {
        clientSelect.value = previousClientValue || '';
        showNewClientView();
        return;
      }
      previousClientValue = clientSelect.value;
      updateDependencyState({ selectedCampaign: '', selectedProject: '' });
      updateLiveValidation();
    }

    function handleCampaignInput() {
      const { campaign } = getFieldRefs();
      if (campaign.value === '__autre__') {
        campaign.value = '';
        populateProjectOptions('');
        closeCustomField('project');
        openCustomField('campaign');
        return;
      }
      populateProjectOptions('');
      closeCustomField('project');
      updateLiveValidation();
    }

    function handleProjectChange() {
      const { project } = getFieldRefs();
      if (project.value === '__autre__') {
        project.value = '';
        openCustomField('project');
        return;
      }
      updateLiveValidation();
    }

    function handleActivityChange() {
      const { activitySelect } = getFieldRefs();
      if (activitySelect.value === '__autre__') {
        activitySelect.value = '';
        openCustomField('activity');
        return;
      }
      if (isCustomFieldActive('activity')) {
        closeCustomField('activity');
      }
      updateLiveValidation();
    }

    function handleRateChange() {
      const { rateSelect } = getFieldRefs();
      if (rateSelect.value === '__autre__') {
        rateSelect.value = '';
        openCustomField('rate');
        return;
      }
      if (isCustomFieldActive('rate')) {
        closeCustomField('rate');
      }
      updateLiveValidation();
    }

    function cancelNewClientView() {
      showFormView();
      const { clientSelect } = getFieldRefs();
      clientSelect.value = previousClientValue || '';
      updateDependencyState({ selectedCampaign: '', selectedProject: '' });
      updateLiveValidation();
    }

    function saveNewClientView() {
      const companyName = document.getElementById('clientCompanyName').value.trim();
      const primaryContactName = document.getElementById('clientPrimaryContactName').value.trim();
      const primaryContactEmail = document.getElementById('clientPrimaryContactEmail').value.trim();
      const secondaryContactName = document.getElementById('clientSecondaryContactName').value.trim();
      const secondaryContactEmail = document.getElementById('clientSecondaryContactEmail').value.trim();
      const billingContactName = document.getElementById('clientBillingContactName').value.trim();
      const billingEmail = document.getElementById('clientBillingEmail').value.trim();

      if (!companyName || !primaryContactName || !primaryContactEmail) {
        newClientValidationActivated = true;
        updateNewClientValidation();
        return;
      }

      pendingNewClientData = {
        companyName,
        primaryContactName,
        primaryContactEmail,
        secondaryContactName,
        secondaryContactEmail,
        billingContactName,
        billingEmail
      };

      populateClientOptions('__new_client__');
      previousClientValue = '__new_client__';
      showFormView();
      updateDependencyState({ selectedCampaign: '', selectedProject: '' });
      updateLiveValidation();
    }

    function validateForm(activateValidation = false) {
      if (activateValidation) {
        formValidationActivated = true;
      }
      updateLiveValidation();

      const {
        clientSelect,
        campaign,
        project,
        activitySelect,
        note,
        rateSelect,
        customCampaign,
        customProject,
        customActivity,
        customRate
      } = getFieldRefs();

      const isClientValid = clientSelect.value !== '' && clientSelect.value !== '__autre__';
      const isCampaignValid = isCustomFieldActive('campaign')
        ? customCampaign.value.trim() !== ''
        : campaign.value !== '' && campaign.value !== '__autre__';
      const isProjectValid = isCustomFieldActive('project')
        ? customProject.value.trim() !== ''
        : project.value !== '' && project.value !== '__autre__';
      const isActivityValid = isCustomFieldActive('activity')
        ? customActivity.value.trim() !== ''
        : activitySelect.value !== '' && activitySelect.value !== '__autre__';
      const isRateValid = isCustomFieldActive('rate')
        ? /^\d+$/.test(customRate.value.trim())
        : rateSelect.value !== '' && rateSelect.value !== '__autre__';
      const isNoteValid = note.value.trim() !== '';

      let message = "";
      if (!isClientValid) {
        message = "Veuillez sélectionner ou saisir un client.";
      } else if (!isCampaignValid) {
        message = "Veuillez saisir une campagne.";
      } else if (!isProjectValid) {
        message = "Veuillez saisir un projet.";
      } else if (!isActivityValid) {
        message = "Veuillez sélectionner ou saisir une activité.";
      } else if (!isNoteValid) {
        message = "Veuillez saisir une note.";
      } else if (!isRateValid) {
        message = "Veuillez sélectionner ou saisir un taux valide.";
      }

      return {
        isValid: isClientValid && isCampaignValid && isProjectValid && isActivityValid && isRateValid && isNoteValid,
        message
      };
    }

    function submitForm() {
      if (isSubmitting) return;

      const validation = validateForm(true);
      if (!validation.isValid) {
        showErrorView(validation.message);
        return;
      }

      const {
        clientSelect,
        campaign,
        project,
        activitySelect,
        note,
        rateSelect,
        customCampaign,
        customProject,
        customActivity,
        customRate
      } = getFieldRefs();

      const finalClient = clientSelect.value === '__new_client__' && pendingNewClientData
        ? pendingNewClientData.companyName
        : clientSelect.value;
      const finalCampaign = isCustomFieldActive('campaign') ? customCampaign.value.trim() : campaign.value;
      const finalProject = isCustomFieldActive('project') ? customProject.value.trim() : project.value;
      const finalActivity = isCustomFieldActive('activity') ? customActivity.value.trim() : activitySelect.value;
      const finalRate = isCustomFieldActive('rate') ? customRate.value.trim() : rateSelect.value;
      const noteValue = note.value.trim();

      isSubmitting = true;
      showLoadingView();

      google.script.run
        .withSuccessHandler(() => {
          showSuccessView();
          window.setTimeout(() => {
            google.script.host.close();
          }, 300);
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? error.message : null);
        })
        .submitTimeEntryForm(
          finalClient,
          finalCampaign,
          finalProject,
          finalActivity,
          <?!= typeof newRow === 'number' ? newRow : 7 ?>,
          <?!= typeof checkedRowIndex === 'number' ? checkedRowIndex : -1 ?>,
          pendingNewClientData ? pendingNewClientData.companyName : null,
          isCustomFieldActive('activity') ? finalActivity : null,
          finalRate,
          noteValue,
          {
            newClientDetails: pendingNewClientData,
            isCustomCampaign: isCustomFieldActive('campaign'),
            isCustomProject: isCustomFieldActive('project'),
            isCustomRate: isCustomFieldActive('rate')
          }
        );
    }

    document.addEventListener('DOMContentLoaded', () => {
      populateClientOptions(initialClientSelected);
      populateActivityOptions(initialActivitySelected);
      initializeRateOptions('');
      updateDependencyState({
        selectedCampaign: initialCampaignSelected,
        selectedProject: initialProjectSelected
      });
      formValidationActivated = false;
      newClientValidationActivated = false;
      clearValidationState();
      showFormView();
      updateLiveValidation();
    });
  </script>
</body>
</html>
