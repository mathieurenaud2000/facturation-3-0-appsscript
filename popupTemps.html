<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: Roboto, sans-serif; }

    .container {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .popup-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .popup-view.active {
      display: flex;
    }

    .form-view {
      justify-content: flex-start;
    }

    .status-view {
      justify-content: flex-start;
      padding-top: 75px;
    }

    .error-view {
      justify-content: flex-start;
      padding-top: 60px;
    }

    .form-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 0;
    }

    .label {
      margin: 0;
      padding: 5px 0;
      font-size: 10pt;
      color: #888;
      width: 100%;
    }

    select, input {
      width: 100%;
      margin: 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 0;
      font-size: 13pt;
      color: #000;
    }

    select option:not([value=""]) { color: #000000; }
    select.invalid, input.invalid { border: 1px solid #ff0000; }

    #rate { border: 0px; width: 50px; text-align: left; padding: 0px; margin: 0px; color: #888; }
    #rate option { padding: 0px; margin: 0px; color: #888; }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: grid;
      grid-template-columns: 40% 60%;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0px;
    }

    .rate-container {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0px;
    }

    .btn-container {
      display: flex;
      justify-content: flex-end;
      padding: 0px;
    }

    .btn {
      margin-left: 20px;
      padding: 12px 120px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 18px;
      text-align: center;
    }

    .btn-green {
      background-color: #4CAF50;
      color: white;
      border: 1px solid #4CAF50;
    }

    .btn-green:hover {
      background-color: #45a049;
      border: 1px solid #45a049;
    }

    .spinner {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #4CAF50;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin: 20px 0 5px 0;
    }

    .message-sub {
      font-size: 14pt;
      text-align: center;
    }

    .success-icon {
      color: #4CAF50;
      font-size: 90px;
      margin-bottom: 15px;
    }

    .error-actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    .micro-input {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView" class="popup-view form-view active">
      <div id="formContainer" class="form-container">
        <div class="label" id="clientLabel">Client :</div>
        <select id="clientSelect" onchange="handleClientChange()">
          <option value="">Sélectionnez un client</option>
          <?!= Array.isArray(clients) ? clients.map(client => `<option value="${client}" ${client === (clientSelected || '') ? 'selected' : ''}>${client}</option>`).join('') : '' ?>
          <option value="__autre__">Autre...</option>
        </select>
        <input type="text" id="newClientInput" class="micro-input" placeholder="Entrez un nouveau client" style="display:none;" oninput="handleClientInput()">
        <div class="label">Campagne :</div>
        <input type="text" id="campaign" value="<?!= typeof campaign === 'string' ? campaign : '' ?>" oninput="handleCampaignInput()">
        <div class="label">Projet :</div>
        <input type="text" id="project" value="<?!= typeof project === 'string' ? project : '' ?>" oninput="clearValidationState()">
        <div class="label" id="activityLabel">Activité :</div>
        <select id="activitySelect" onchange="handleActivityChange()">
          <option value="">Sélectionnez une activité</option>
          <?!= Array.isArray(activities) ? activities.map(activity => `<option value="${activity}" ${activity === (activitySelected || '') ? 'selected' : ''}>${activity}</option>`).join('') : '' ?>
          <option value="__autre__">Autre...</option>
        </select>
        <input type="text" id="newActivityInput" class="micro-input" placeholder="Entrez une nouvelle activité" style="display:none;" oninput="handleActivityInput()">
      </div>

      <div class="footer" id="footer">
        <div class="rate-container">
          <div class="label">Taux :</div>
          <select id="rate"></select>
          <div id="newRateContainer" style="display: none; flex-direction: row; align-items: center; width: 100%; margin-top: 8px;">
            <input type="number" id="newRateInput" min="1" max="1000" style="width: 70px; font-size: 13pt; padding: 8px; border: 1px solid #ccc; border-radius: 0;" oninput="clearValidationState()" />
            <span style="margin-left: 10px; font-size: 10pt; color: #888;">$/h</span>
          </div>
        </div>
        <div class="btn-container">
          <button id="submit" class="btn btn-green" onclick="submitForm()">OK</button>
        </div>
      </div>
    </div>

    <div id="loadingView" class="popup-view status-view">
      <div class="spinner"></div>
      <div class="message-title">Création de l'entrée</div>
      <div class="message-sub">Veuillez patienter...</div>
    </div>

    <div id="successView" class="popup-view status-view">
      <i class="fas fa-check-circle success-icon"></i>
      <div class="message-title">Entrée créée</div>
      <div class="message-sub">Fermeture en cours...</div>
    </div>

    <div id="errorView" class="popup-view error-view">
      <div class="message-title">Erreur</div>
      <div class="message-sub" id="errorMessage"></div>
      <div class="error-actions">
        <button class="btn btn-green" onclick="showFormView()">Retour</button>
      </div>
    </div>
  </div>

  <script>
    let rates = <?!= JSON.stringify(rates || ['0']) ?>;
    if (!Array.isArray(rates)) rates = ['0'];
    const popupViewIds = ['formView', 'loadingView', 'successView', 'errorView'];
    let isSubmitting = false;
    let lastClientKey = null;
    let lastCampaignValue = null;

    function getFieldRefs() {
      return {
        clientSelect: document.getElementById('clientSelect'),
        newClientInput: document.getElementById('newClientInput'),
        clientLabel: document.getElementById('clientLabel'),
        campaign: document.getElementById('campaign'),
        project: document.getElementById('project'),
        activitySelect: document.getElementById('activitySelect'),
        newActivityInput: document.getElementById('newActivityInput'),
        activityLabel: document.getElementById('activityLabel'),
        rateSelect: document.getElementById('rate'),
        newRateContainer: document.getElementById('newRateContainer'),
        newRateInput: document.getElementById('newRateInput'),
        submit: document.getElementById('submit')
      };
    }

    function setActiveView(viewId) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle('active', id === viewId);
      });
    }

    function setSubmitDisabled(disabled) {
      getFieldRefs().submit.disabled = disabled;
    }

    function showFormView() {
      isSubmitting = false;
      setSubmitDisabled(false);
      setActiveView('formView');
    }

    function showLoadingView() {
      setSubmitDisabled(true);
      setActiveView('loadingView');
    }

    function showSuccessView() {
      setSubmitDisabled(true);
      setActiveView('successView');
    }

    function showErrorView(message) {
      const safeMessage = typeof message === 'string' && message.trim() !== ''
        ? message
        : "Une erreur est survenue.";
      isSubmitting = false;
      setSubmitDisabled(false);
      document.getElementById('errorMessage').textContent = safeMessage;
      setActiveView('errorView');
    }

    function initializeRateOptions() {
      const { rateSelect } = getFieldRefs();
      rateSelect.innerHTML = '';
      rates.forEach((rate, index) => {
        const option = document.createElement('option');
        option.value = rate;
        option.text = rate === '0' ? 'Aucun taux disponible' : rate;
        if (index === 0) option.selected = true;
        rateSelect.appendChild(option);
      });

      const plusOption = document.createElement('option');
      plusOption.value = '__ajouter__';
      plusOption.text = '+';
      rateSelect.appendChild(plusOption);
      rateSelect.addEventListener('change', () => {
        updateRateMode();
        clearValidationState();
      });
      updateRateMode();
    }

    function clearValidationState() {
      const {
        clientSelect,
        newClientInput,
        campaign,
        project,
        activitySelect,
        newActivityInput,
        rateSelect,
        newRateInput
      } = getFieldRefs();

      [
        clientSelect,
        newClientInput,
        campaign,
        project,
        activitySelect,
        newActivityInput,
        rateSelect,
        newRateInput
      ].forEach(field => field.classList.remove('invalid'));
    }

    function getClientKey() {
      const { clientSelect, newClientInput } = getFieldRefs();
      return clientSelect.value === "__autre__"
        ? `__new__:${newClientInput.value.trim()}`
        : clientSelect.value;
    }

    function updateClientMode() {
      const { clientSelect, newClientInput, clientLabel } = getFieldRefs();
      const isNewClient = clientSelect.value === "__autre__";
      newClientInput.style.display = isNewClient ? 'block' : 'none';
      if (!isNewClient) {
        newClientInput.value = '';
      }
      clientLabel.textContent = isNewClient ? "Nouveau client :" : "Client :";
    }

    function updateActivityMode() {
      const { activitySelect, newActivityInput, activityLabel } = getFieldRefs();
      const isNewActivity = activitySelect.value === "__autre__";
      newActivityInput.style.display = isNewActivity ? 'block' : 'none';
      if (!isNewActivity) {
        newActivityInput.value = '';
      }
      activityLabel.textContent = isNewActivity ? "Nouvelle activité :" : "Activité :";
    }

    function updateRateMode() {
      const { rateSelect, newRateContainer, newRateInput } = getFieldRefs();
      const isCustomRate = rateSelect.value === '__ajouter__';
      newRateContainer.style.display = isCustomRate ? 'flex' : 'none';
      if (!isCustomRate) {
        newRateInput.value = '';
      }
    }

    function updateDependencyState(options = {}) {
      const { initialize = false } = options;
      const { campaign, project } = getFieldRefs();
      const clientKey = getClientKey();
      const hasClient = clientKey !== '' && clientKey !== '__new__:';
      const trimmedCampaign = campaign.value.trim();

      if (!initialize && lastClientKey !== null && clientKey !== lastClientKey) {
        campaign.value = '';
        project.value = '';
      }

      campaign.disabled = !hasClient;
      if (!hasClient) {
        campaign.value = '';
        project.value = '';
      }

      if (!initialize && lastCampaignValue !== null && campaign.value.trim() !== lastCampaignValue) {
        project.value = '';
      }

      project.disabled = !hasClient || trimmedCampaign === '';
      if (project.disabled) {
        project.value = '';
      }

      lastClientKey = clientKey;
      lastCampaignValue = campaign.value.trim();
    }

    function handleClientChange() {
      updateClientMode();
      updateDependencyState();
      clearValidationState();
    }

    function handleClientInput() {
      updateDependencyState();
      clearValidationState();
    }

    function handleActivityChange() {
      updateActivityMode();
      clearValidationState();
    }

    function handleActivityInput() {
      clearValidationState();
    }

    function handleCampaignInput() {
      updateDependencyState();
      clearValidationState();
    }

    function validateForm() {
      const {
        clientSelect,
        newClientInput,
        campaign,
        project,
        activitySelect,
        newActivityInput,
        rateSelect,
        newRateInput
      } = getFieldRefs();

      const usingNewClient = clientSelect.value === "__autre__";
      const usingNewActivity = activitySelect.value === "__autre__";
      const usingCustomRate = rateSelect.value === '__ajouter__';
      const cleanedRate = usingCustomRate
        ? newRateInput.value.trim().replace(/[^0-9]/g, '')
        : rateSelect.value;

      const isClientValid = usingNewClient ? newClientInput.value.trim() !== "" : clientSelect.value !== "";
      const isCampaignValid = campaign.value.trim() !== "";
      const isProjectValid = project.value.trim() !== "";
      const isActivityValid = usingNewActivity ? newActivityInput.value.trim() !== "" : activitySelect.value !== "";
      const isRateValid = usingCustomRate ? /^\d+$/.test(newRateInput.value.trim()) && cleanedRate !== "" : cleanedRate !== "";

      clearValidationState();
      clientSelect.classList.toggle("invalid", !isClientValid);
      newClientInput.classList.toggle("invalid", usingNewClient && !isClientValid);
      campaign.classList.toggle("invalid", !isCampaignValid);
      project.classList.toggle("invalid", !isProjectValid);
      activitySelect.classList.toggle("invalid", !isActivityValid);
      newActivityInput.classList.toggle("invalid", usingNewActivity && !isActivityValid);
      rateSelect.classList.toggle("invalid", !usingCustomRate && !isRateValid);
      newRateInput.classList.toggle("invalid", usingCustomRate && !isRateValid);

      let message = "";
      if (!isClientValid) {
        message = "Veuillez sélectionner ou saisir un client.";
      } else if (!isCampaignValid) {
        message = "Veuillez saisir une campagne.";
      } else if (!isProjectValid) {
        message = "Veuillez saisir un projet.";
      } else if (!isActivityValid) {
        message = "Veuillez sélectionner ou saisir une activité.";
      } else if (!isRateValid) {
        message = "Veuillez sélectionner ou saisir un taux valide.";
      }

      return {
        isValid: isClientValid && isCampaignValid && isProjectValid && isActivityValid && isRateValid,
        message
      };
    }

    function submitForm() {
      if (isSubmitting) return;

      const validation = validateForm();
      if (!validation.isValid) {
        showErrorView(validation.message);
        return;
      }

      const {
        clientSelect,
        newClientInput,
        campaign,
        project,
        activitySelect,
        newActivityInput,
        rateSelect,
        newRateInput
      } = getFieldRefs();

      const client = clientSelect.value;
      const newClient = newClientInput.value.trim();
      const campaignValue = campaign.value.trim();
      const projectValue = project.value.trim();
      const activity = activitySelect.value;
      const newActivity = newActivityInput.value.trim();

      let rate = rateSelect.value;
      if (rate === '__ajouter__') {
        rate = newRateInput.value.trim().replace(/[^0-9]/g, '');
      }

      const finalClient = client === "__autre__" ? newClient : client;
      const finalActivity = activity === "__autre__" ? newActivity : activity;

      isSubmitting = true;
      showLoadingView();

      google.script.run
        .withSuccessHandler(() => {
          showSuccessView();
          window.setTimeout(() => {
            google.script.host.close();
            google.script.run.showBeepPopup();
          }, 300);
        })
        .withFailureHandler(error => {
          showErrorView(error && error.message ? `Erreur : ${error.message}` : null);
        })
        .submitTimeEntryForm(
          finalClient,
          campaignValue,
          projectValue,
          finalActivity,
          <?!= typeof newRow === 'number' ? newRow : 7 ?>,
          <?!= typeof checkedRowIndex === 'number' ? checkedRowIndex : -1 ?>,
          client === "__autre__" ? newClient : null,
          activity === "__autre__" ? newActivity : null,
          rate
        );
    }

    document.addEventListener('DOMContentLoaded', () => {
      showFormView();
      updateClientMode();
      updateActivityMode();
      initializeRateOptions();
      updateDependencyState({ initialize: true });
    });
  </script>
</body>
</html>
