<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .container {
      padding-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .icon {
      color: #cc0000;
      font-size: 40px;
      margin-bottom: 20px;
    }

    .message {
      font-size: 24pt;
      padding: 0 30px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0;
    }

    .btn {
      font-size: 18px;
      padding: 12px 35px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      margin-left: 20px;
    }

    .btn-red {
      background-color: #cc0000;
      color: white;
    }

    .btn-red:hover {
      background-color: #e60000;
    }

    .btn-white {
      background-color: white;
      border: 1px solid #ccc;
      color: black;
    }

    .btn-white:hover {
      border-color: black;
    }

    .loader {
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      margin-top: 0px;
      padding-top: 25px;
    }

    .spinner {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #aaa;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="contentContainer">
    <i class="fas fa-exclamation-triangle icon"></i>
    <div class="message">Certain?</div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="footer" id="footer">
    <button class="btn btn-white" onclick="google.script.host.close()">Annuler</button>
    <button class="btn btn-red" onclick="confirmer()">Supprimer</button>
  </div>

  <script>
    function confirmer() {
      document.getElementById('contentContainer').style.display = 'none';
      document.getElementById('footer').style.display = 'none';
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(() => google.script.host.close()).supprimerLignesCochées();
    }
  </script>
</body>
</html>
