<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      margin: 0;
      padding: 0px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .form-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 0;
    }

    .url-field {
      grid-column: 1 / -1;
      padding-top: 10px;
    }

    .label {
      margin: 0;
      padding: 5px 0;
      font-size: 10pt;
      color: #888;
      width: 100%;
    }

    input {
      width: 100%;
      margin: 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 0;
      font-size: 13pt;
      color: #000;
    }

    input.invalid {
      border: 1px solid #ff0000;
    }

    .footer {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 60px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 0px;
      padding-right: 0px;
    }

    .footer-left {
      display: flex;
      flex-direction: column;
      padding-left: 0px;
    }

    .footer-left .label {
      font-size: 10pt;
      color: #888;
    }

    .footer-left input {
      width: 80px;
      padding: 5px;
      font-size: 13pt;
    }

    .btn-container {
      display: flex;
      //justify-content: flex-end;
      align-items: flex-end; /* Alignement bas */
      height: 100%;          /* Prend toute la hauteur du footer */
      padding-right: 0px;
    }

    .btn {
      margin-left: 20px;
      padding: 10px 80px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 18px;
      text-align: center;
    }

    .btn-green {
      background-color: #4CAF50;
      color: white;
      border: 1px solid #4CAF50;
    }

    .btn-green:hover {
      background-color: #45a049;
      border: 1px solid #45a049;
    }

    .btn-cancel {
      background-color: #ccc;
      color: #000;
      border: 1px solid #ccc;
      padding: 10px 40px;
    }

    .btn-cancel:hover {
      background-color: #b3b3b3;
      border: 1px solid #b3b3b3;
    }

    .loader {
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      flex: 1;
      margin-top: 75px;
    }

    .spinner {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #4CAF50;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formContainer" class="form-container">
      <div>
        <div class="label">Nom :</div>
        <input type="text" id="name" value="<?!= name || '' ?>">
        <div class="label">Courriel :</div>
        <input type="text" id="email" value="<?!= email || '' ?>">
        <div class="label">Site Web :</div>
        <input type="text" id="website" value="<?!= website || '' ?>">
      </div>
      <div>
        <div class="label">Adresse Ligne 1 :</div>
        <input type="text" id="address1" value="<?!= address1 || '' ?>">
        <div class="label">Adresse Ligne 2 :</div>
        <input type="text" id="address2" value="<?!= address2 || '' ?>">
        <div class="label">Adresse Ligne 3 :</div>
        <input type="text" id="address3" value="<?!= address3 || '' ?>">
        <div class="label">Adresse Ligne 4 :</div>
        <input type="text" id="address4" value="<?!= address4 || '' ?>">
      </div>
      <div class="url-field">
        <div class="label">URL du dossier Google Drive où sauver les factures :</div>
        <input type="text" id="folderUrl" value="<?!= folderUrl || '' ?>">
      </div>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
    </div>

    <div class="footer" id="footer">
      <div class="footer-left">
        <div class="label">Prochain # de facture :</div>
        <input type="number" id="nextInvoice" value="<?!= nextInvoice || '' ?>">
      </div>
      <div class="btn-container">
        <button id="cancel" class="btn btn-cancel" onclick="google.script.host.close()">Fermer</button>
        <button id="submit" class="btn btn-green" onclick="submitForm()">OK</button>
      </div>
    </div>
  </div>

  <script>
    function validateForm() {
      const address1 = document.getElementById('address1');
      const folderUrl = document.getElementById('folderUrl');
      const isAddress1Valid = address1.value.trim() !== "";
      address1.classList.toggle("invalid", !isAddress1Valid);

      let isFolderUrlValid = true;
      if (folderUrl.value.trim() !== "") {
        const folderRegex = /\/folders\/([a-zA-Z0-9_-]+)/;
        isFolderUrlValid = folderRegex.test(folderUrl.value);
        folderUrl.classList.toggle("invalid", !isFolderUrlValid);
      }

      if (!isAddress1Valid) {
        alert("Veuillez remplir Adresse Ligne 1.");
      } else if (!isFolderUrlValid && folderUrl.value.trim() !== "") {
        alert("Veuillez entrer une URL valide de dossier Google Drive.");
      }

      return isAddress1Valid && isFolderUrlValid;
    }

    function submitForm() {
      if (!validateForm()) return;

      const name = document.getElementById('name').value.trim();
      const address1 = document.getElementById('address1').value.trim();
      const address2 = document.getElementById('address2').value.trim();
      const address3 = document.getElementById('address3').value.trim();
      const address4 = document.getElementById('address4').value.trim();
      const email = document.getElementById('email').value.trim();
      const website = document.getElementById('website').value.trim();
      const folderUrl = document.getElementById('folderUrl').value.trim();
      const nextInvoice = document.getElementById('nextInvoice').value.trim();

      document.getElementById('formContainer').style.display = 'none';
      document.getElementById('footer').style.display = 'none';
      document.getElementById('loader').style.display = 'flex';

      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler((error) => {
          alert('Erreur lors de la soumission : ' + error.message);
          document.getElementById('formContainer').style.display = 'block';
          document.getElementById('footer').style.display = 'flex';
          document.getElementById('loader').style.display = 'none';
        })
        .submitInfoForm(name, address1, address2, address3, address4, email, website, folderUrl, nextInvoice);
    }
  </script>
</body>
</html>
