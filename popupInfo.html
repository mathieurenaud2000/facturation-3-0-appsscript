<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    .config-content {
      flex: 1;
      width: 100%;
      padding: 0 24px;
      padding-bottom: 90px;
      overflow: auto;
    }

    .config-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 24px;
    }

    .config-column {
      padding-top: 25px;
    }

    .column-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .column-icon.material-symbols-outlined {
      width: 25px;
      height: 25px;
      font-size: 25px;
      line-height: 1;
      color: #000000;
    }

    .column-title {
      font-size: 24pt;
      font-weight: 700;
      line-height: 1.15;
      color: #000000;
    }

    .column-fields {
      padding-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .field-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 16pt;
      line-height: 1.2;
    }

    .field-label.is-required {
      font-weight: 700;
      color: #000000;
    }

    .field-label.is-optional {
      font-weight: 400;
      color: #666666;
    }

    .field-input {
      width: 100%;
      height: 35px;
      padding: 0 12px 0 24px;
      border-radius: 10px;
      font-family: Roboto, sans-serif;
      font-size: 16pt;
      font-weight: 400;
      color: #000000;
      line-height: 35px;
      background: #ffffff;
      outline: none;
    }

    .field-input.is-required {
      border: 1px solid #000000;
    }

    .field-input.is-optional {
      border: 1px solid #b3b3b3;
    }

    .field-input.invalid {
      border: 1px solid #ff0000;
    }

    .error-message {
      display: none;
      margin-top: 15px;
      padding: 10px 12px;
      border: 1px solid #ff0000;
      color: #b00020;
      background-color: #fff4f4;
      font-size: 11pt;
      width: 100%;
    }

    .error-message.active {
      display: block;
    }

    .config-footer {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 78px;
      padding: 24px 24px 4px 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      column-gap: 24px;
      align-items: stretch;
      align-content: start;
      background: #ffffff;
      border-top: none;
    }

    .btn {
      height: 50px;
      min-height: 50px;
      width: 100%;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: Roboto, sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      margin: 0;
      background: #ffffff;
    }

    .btn-white {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #d4d4d4;
    }

    .btn-white:hover {
      background-color: #ffffff;
      border: 1px solid #000000;
    }

    .btn-green {
      background-color: #00983a;
      color: #ffffff;
      border: 1px solid #00983a;
    }

    .btn-green:hover {
      background-color: #1ecc00;
      border: 1px solid #1ecc00;
    }

    .btn-green:disabled,
    .btn-green[disabled],
    .btn-green.disabled,
    .btn:disabled.btn-green,
    .btn[disabled].btn-green,
    .btn.btn-green.disabled {
      background-color: #efefef;
      border: 1px solid #efefef;
      color: #ffffff;
      cursor: not-allowed;
    }

    #cancel {
      grid-column: 1;
      justify-self: end;
      align-self: stretch;
      width: 50%;
    }

    #submit {
      grid-column: 2;
      justify-self: stretch;
      align-self: stretch;
      width: 100%;
    }

    .loading-screen {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      background: #ffffff;
    }

    .loading-screen.active {
      display: block;
    }

    .standard-alert-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      text-align: center;
    }

    .standard-alert-icon {
      display: block;
      width: 150px;
      height: 150px;
      object-fit: contain;
      margin: 0 0 25px 0;
    }

    .standard-alert-title {
      font-size: 24pt;
      font-weight: 700;
      line-height: 1.15;
      color: #000000;
      text-align: center;
      margin: 0 0 10px 0;
    }

    .standard-alert-text {
      font-size: 18pt;
      font-weight: 400;
      line-height: 1.25;
      color: #666666;
      text-align: center;
      white-space: pre-line;
      margin: 0;
    }

    .loading-spinner {
      animation: spin 2.5s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loadingScreen" class="loading-screen" aria-live="polite">
      <div class="standard-alert-content">
        <img class="standard-alert-icon loading-spinner" src="https://drive.google.com/thumbnail?id=1lL-31VG7OALHrcuzGB6asjqEoaKJP4K0&amp;sz=w300" alt="">
        <div class="standard-alert-title">Enregistrement</div>
        <div class="standard-alert-text">Veuillez patienter...</div>
      </div>
    </div>

    <div id="formContainer" class="config-content">
      <div class="config-grid">
        <section class="config-column" aria-label="Identification">
          <div class="column-header">
            <span class="material-symbols-outlined column-icon" aria-hidden="true">account_circle</span>
            <div class="column-title">Identification</div>
          </div>
          <div class="column-fields">
            <div class="field-group">
              <div class="field-label is-required">Nom</div>
              <input type="text" id="name" class="field-input is-required" value="<?!= name || '' ?>">
            </div>
            <div class="field-group">
              <div class="field-label is-required">Courriel</div>
              <input type="text" id="email" class="field-input is-required" value="<?!= email || '' ?>">
            </div>
            <div class="field-group">
              <div class="field-label is-optional">Site web</div>
              <input type="text" id="website" class="field-input is-optional" value="<?!= website || '' ?>">
            </div>
          </div>
        </section>

        <section class="config-column" aria-label="Coordonnés">
          <div class="column-header">
            <span class="material-symbols-outlined column-icon" aria-hidden="true">house</span>
            <div class="column-title">Coordonnés</div>
          </div>
          <div class="column-fields">
            <div class="field-group">
              <div class="field-label is-required">Adresse (ligne 1)</div>
              <input type="text" id="address1" class="field-input is-required" value="<?!= address1 || '' ?>">
            </div>
            <div class="field-group">
              <div class="field-label is-required">Adresse (ligne 2)</div>
              <input type="text" id="address2" class="field-input is-required" value="<?!= address2 || '' ?>">
            </div>
            <div class="field-group">
              <div class="field-label is-optional">Adresse (ligne 3)</div>
              <input type="text" id="address3" class="field-input is-optional" value="<?!= address3 || '' ?>">
            </div>
            <div class="field-group">
              <div class="field-label is-optional">Adresse (ligne 4)</div>
              <input type="text" id="address4" class="field-input is-optional" value="<?!= address4 || '' ?>">
            </div>
          </div>
        </section>

        <section class="config-column" aria-label="Facture">
          <div class="column-header">
            <span class="material-symbols-outlined column-icon" aria-hidden="true">format_list_bulleted</span>
            <div class="column-title">Facture</div>
          </div>
          <div class="column-fields">
            <div class="field-group">
              <div class="field-label is-required">No. de facture</div>
              <input type="text" inputmode="numeric" id="nextInvoice" class="field-input is-required" value="<?!= nextInvoice || '' ?>">
            </div>
          </div>
        </section>
      </div>
      <div id="errorMessage" class="error-message" aria-live="polite"></div>
    </div>

    <div class="config-footer" id="footer">
      <button id="cancel" class="btn btn-white" type="button" onclick="google.script.host.close()">Annuler</button>
      <button id="submit" class="btn btn-green" type="button" onclick="submitForm()">Enregistrer</button>
    </div>
  </div>

  <script>
    window.continueFacturerAfterSave = <?!= JSON.stringify(typeof continueFacturerAfterSave === "undefined" ? false : continueFacturerAfterSave) ?>;
    window.existingInvoiceNumbers = <?!= JSON.stringify(typeof existingInvoiceNumbers === "undefined" ? [] : existingInvoiceNumbers) ?>;

    const requiredFieldLabels = {
      name: "Nom",
      email: "Courriel",
      address1: "Adresse Ligne 1",
      address2: "Adresse Ligne 2",
      nextInvoice: "Prochain # de facture"
    };

    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.classList.add('active');
    }

    function clearError() {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = '';
      errorMessage.classList.remove('active');
    }

    function getField(id) {
      return document.getElementById(id);
    }

    function getRequiredFields() {
      return Object.keys(requiredFieldLabels).map(id => getField(id));
    }

    function getExistingInvoiceNumbers() {
      return Array.isArray(window.existingInvoiceNumbers)
        ? window.existingInvoiceNumbers.map(value => Number(value)).filter(value => Number.isInteger(value) && value > 0)
        : [];
    }

    function sanitizeNextInvoice() {
      const nextInvoice = getField('nextInvoice');
      const sanitizedValue = nextInvoice.value.replace(/\D/g, '');
      if (nextInvoice.value !== sanitizedValue) {
        nextInvoice.value = sanitizedValue;
      }
    }

    function getNextInvoiceNumber() {
      const nextInvoiceValue = getField('nextInvoice').value.trim();
      if (!/^\d+$/.test(nextInvoiceValue)) {
        return NaN;
      }
      return Number(nextInvoiceValue);
    }

    function isNextInvoiceDuplicate() {
      const nextInvoiceNumber = getNextInvoiceNumber();
      return Number.isInteger(nextInvoiceNumber) && getExistingInvoiceNumbers().includes(nextInvoiceNumber);
    }

    function setSubmitDisabled(isDisabled) {
      const submit = document.getElementById('submit');
      submit.disabled = isDisabled;
    }

    function validateForm(showMessages = false) {
      sanitizeNextInvoice();
      const emptyRequiredFields = getRequiredFields().filter(field => field.value.trim() === "");
      getRequiredFields().forEach(field => {
        field.classList.toggle("invalid", field.value.trim() === "");
      });

      const nextInvoice = getField('nextInvoice');
      const nextInvoiceNumber = getNextInvoiceNumber();
      const isNextInvoiceValid = Number.isInteger(nextInvoiceNumber) && nextInvoiceNumber > 0;
      const hasDuplicateInvoiceNumber = isNextInvoiceDuplicate();
      nextInvoice.classList.toggle("invalid", nextInvoice.value.trim() === "" || !isNextInvoiceValid || hasDuplicateInvoiceNumber);

      const isValid = emptyRequiredFields.length === 0 && isNextInvoiceValid && !hasDuplicateInvoiceNumber;
      setSubmitDisabled(!isValid);

      if (!showMessages) {
        if (isValid) {
          clearError();
        }
        return isValid;
      }

      if (emptyRequiredFields.length) {
        const labels = emptyRequiredFields.map(field => requiredFieldLabels[field.id]).join(", ");
        showError("Veuillez remplir les champs obligatoires : " + labels + ".");
      } else if (!isNextInvoiceValid) {
        showError("Veuillez saisir un numéro de facture valide.");
      } else if (hasDuplicateInvoiceNumber) {
        showError("Ce numéro de facture existe déjà.");
      } else {
        clearError();
      }

      return isValid;
    }

    function updateSubmitState() {
      return validateForm(false);
    }

    function showForm() {
      document.getElementById('loadingScreen').classList.remove('active');
      document.getElementById('formContainer').style.display = 'block';
      document.getElementById('footer').style.display = 'grid';
    }

    function showLoader() {
      clearError();
      document.getElementById('formContainer').style.display = 'none';
      document.getElementById('footer').style.display = 'none';
      document.getElementById('loadingScreen').classList.add('active');
    }

    function handleServerValidationError(result) {
      showForm();
      const message = result && result.message ? result.message : "Erreur lors de la soumission.";
      if (result && result.message === "Ce numéro de facture existe déjà.") {
        getField('nextInvoice').classList.add("invalid");
        setSubmitDisabled(true);
      }
      showError(message);
    }

    function continueFacturerFlow(nextInvoice) {
      google.script.run
        .withSuccessHandler((result) => {
          if (result && result.success === false) {
            handleServerValidationError(result);
            return;
          }
          google.script.host.close();
        })
        .withFailureHandler((error) => {
          showForm();
          showError('Erreur lors de la reprise de la facturation : ' + error.message);
        })
        .continueFacturerAfterConfiguration(nextInvoice);
    }

    function submitForm() {
      if (!validateForm(true)) return;

      const name = document.getElementById('name').value.trim();
      const address1 = document.getElementById('address1').value.trim();
      const address2 = document.getElementById('address2').value.trim();
      const address3 = document.getElementById('address3').value.trim();
      const address4 = document.getElementById('address4').value.trim();
      const email = document.getElementById('email').value.trim();
      const website = document.getElementById('website').value.trim();
      const nextInvoice = document.getElementById('nextInvoice').value.trim();

      showLoader();

      google.script.run
        .withSuccessHandler((result) => {
          if (result && result.success === false) {
            handleServerValidationError(result);
            return;
          }
          if (window.continueFacturerAfterSave) {
            continueFacturerFlow(Number(nextInvoice));
            return;
          }
          google.script.host.close();
        })
        .withFailureHandler((error) => {
          showForm();
          showError('Erreur lors de la soumission : ' + error.message);
        })
        .submitInfoForm(name, address1, address2, address3, address4, email, website, nextInvoice);
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateSubmitState();
      getRequiredFields().forEach(field => {
        field.addEventListener('input', updateSubmitState);
      });
    });
  </script>
</body>
</html>
