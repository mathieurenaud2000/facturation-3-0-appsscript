<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dossier du système</title>
    <style>
      :root {
        --text-black: #000000;
        --text-gray: #666666;
        --border-red: #ff0000;
        --footer-height: 78px;
        --footer-padding-top: 24px;
        --footer-padding-bottom: 4px;
        --footer-gap: 24px;
        --btn-height: 50px;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Roboto, Arial, sans-serif;
        color: var(--text-black);
        background: #ffffff;
      }

      .dialog {
        height: 100%;
        display: grid;
        grid-template-rows: 1fr var(--footer-height);
      }

      .content {
        padding: 0 0;
        display: grid;
        align-content: start;
        justify-items: center;
        overflow: auto;
      }

      .standard-alert-content {
        width: 100%;
        max-width: 720px;
        padding-top: 60px;
        display: grid;
        justify-items: center;
        text-align: center;
      }

      .standard-alert-icon {
        width: 160px;
        height: 160px;
        object-fit: contain;
      }

      .standard-alert-icon-symbol {
        font-size: 100px !important;
        line-height: 1;
        color: #00983a;
      }

      .standard-alert-title {
        margin-top: 5px;
        font-size: 24pt;
        font-weight: 700;
        color: var(--text-black);
      }

      .standard-alert-text {
        margin-top: 12px;
        font-size: 16pt;
        font-weight: 400;
        color: var(--text-gray);
        max-width: 680px;
      }

      .standard-alert-text.is-error {
        color: var(--border-red);
        font-weight: 700;
      }

      .loading-screen {
        display: none;
        width: 100%;
        height: 100%;
        padding-top: 100px;
        box-sizing: border-box;
      }

      .loading-screen.active {
        display: grid;
        justify-items: center;
        align-content: start;
      }

      .loading-spinner {
        animation: spin 2.5s ease-in-out infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .field-row {
        margin-top: 25px;
        width: 80%;
        min-width: 360px;
        display: grid;
      }

      .field-input {
        height: 35px;
        box-sizing: border-box;
        padding-left: 10px;
        padding-right: 10px;
        border-radius: 3px;
        border: 1px solid #c6c6c6;
        font-size: 9pt;
        font-weight: 400;
        outline: none;
        text-align: center;
      }

      .field-input.invalid {
        border-color: var(--border-red);
      }

      .footer {
        height: var(--footer-height);
        padding: var(--footer-padding-top) 0 var(--footer-padding-bottom) 0;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--footer-gap);
        align-items: stretch;
      }

      .btn {
        height: var(--btn-height);
        width: 100%;
        border-radius: 10px;
        border: 1px solid #000000;
        font-size: 16pt;
        cursor: pointer;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 1;
      }

      .btn-white {
        background: #ffffff;
        color: #000000;
      }

      .btn-green {
        background: #00983a;
        border-color: #00983a;
        color: #ffffff;
      }

      /* Button validation states (visual only). */
      #submit.state-idle,
      #submit.state-invalid {
        background: #e6e6e6;
        border-color: #e6e6e6;
        color: #ffffff;
      }

      #submit.state-validating,
      #submit.state-ready {
        background: #00983a;
        border-color: #00983a;
        color: #ffffff;
      }

      #submitLabel {
        display: inline;
      }

      #submitDots {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      #submitDots .dot {
        display: inline-block;
        font-weight: 700;
        font-size: 24px;
        transform: translateY(-1px);
        animation: dotPulse 1s ease-in-out infinite;
      }

      #submitDots .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      #submitDots .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes dotPulse {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
	  <body>
	    <div class="dialog">
	      <main class="content">
	        <div id="loadingScreen" class="loading-screen" aria-live="polite">
	          <img
	            class="standard-alert-icon loading-spinner"
	            src="https://drive.google.com/thumbnail?id=1lL-31VG7OALHrcuzGB6asjqEoaKJP4K0&sz=w300"
	            alt=""
	          />
	        </div>  

	        <div id="normalScreen" class="standard-alert-content">
	          <span class="material-symbols-outlined standard-alert-icon-symbol" aria-hidden="true">folder_open</span>
	          <div class="standard-alert-title">Dossier système</div>
	          <div id="folderDescription" class="standard-alert-text">
	            Coller le lien du dossier FACTURATION™ 3.0
	          </div>

          <div class="field-row">
            <input
              id="driveFolderInput"
              class="field-input"
              type="text"
              value=""
              autocomplete="off"
              spellcheck="false"
            />
	          </div>
	        </div>
	      </main>

	      <footer id="footer" class="footer" aria-label="Actions">
	        <button id="cancel" class="btn btn-white" type="button" onclick="onCancel()">
	          Annuler
	        </button>
	        <button id="submit" class="btn btn-green state-idle" type="button" onclick="onSubmit()" disabled>
            <span id="submitLabel">Enregistrer</span>
            <span id="submitDots" aria-hidden="true">
              <span class="dot">•</span><span class="dot">•</span><span class="dot">•</span>
            </span>
          </button>
	      </footer>
	    </div>

    <script>
      const resumeAction = <?!= JSON.stringify(typeof resumeAction === "undefined" ? "" : resumeAction) ?>;
      const resumePayload = <?!= JSON.stringify(typeof resumePayload === "undefined" ? null : resumePayload) ?>;

      let lastValidationToken = 0;
      let lastValidFolderId = "";
      let isSubmitting = false;
      let validateTimer = null;

      function getInputEl() {
        return document.getElementById("driveFolderInput");
      }

	      function setSubmitDisabled(disabled) {
	        const submit = document.getElementById("submit");
	        submit.disabled = disabled;
	      }

        function setSubmitVisualState(state) {
          const submit = document.getElementById("submit");
          submit.classList.remove("state-idle", "state-validating", "state-ready", "state-invalid");
          submit.classList.add("state-" + state);

          const label = document.getElementById("submitLabel");
          const dots = document.getElementById("submitDots");
          const showDots = state === "validating";
          label.style.display = showDots ? "none" : "inline";
          dots.style.display = showDots ? "inline-flex" : "none";

          // Only "ready" is actually clickable (unless we are submitting and hiding the UI anyway).
          if (!isSubmitting) {
            setSubmitDisabled(state !== "ready");
          }
        }

	      function setInputInvalid(isInvalid) {
	        getInputEl().classList.toggle("invalid", Boolean(isInvalid));
	      }

      function setDescriptionError(isError) {
        document.getElementById("folderDescription").classList.toggle("is-error", Boolean(isError));
      }

      function setDescriptionText(text) {
        document.getElementById("folderDescription").textContent = text;
      }

	      function setSubmittingState(submitting) {
	        isSubmitting = submitting;
	        document.getElementById("cancel").disabled = submitting;
	        setSubmitDisabled(submitting || !lastValidFolderId);
	      }

	      function showSpinnerScreen() {
	        document.getElementById("normalScreen").style.display = "none";
	        document.getElementById("footer").style.display = "none";
	        document.getElementById("loadingScreen").classList.add("active");
	      }

	      function showNormalScreen() {
	        document.getElementById("loadingScreen").classList.remove("active");
	        document.getElementById("normalScreen").style.display = "grid";
	        document.getElementById("footer").style.display = "grid";
	      }

	      function validateNow() {
	        const raw = getInputEl().value;
	        const trimmed = String(raw || "").trim();
	        lastValidFolderId = "";
	        setSubmitVisualState("validating");

	        if (!trimmed) {
	          setInputInvalid(false);
	          setDescriptionError(false);
	          setDescriptionText("Veuillez coller le lien Google Drive du dossier FACTURATION™ 3.0");
	          setSubmitVisualState("idle");
	          return;
	        }

	        const token = ++lastValidationToken;
	        google.script.run
          .withSuccessHandler((result) => {
            if (token !== lastValidationToken) return;
            const isValid = Boolean(result && result.success);
            const folderId = String(result && result.folderId || "");
	            lastValidFolderId = isValid ? folderId : "";
	            setInputInvalid(!isValid);
	            if (!isValid) {
	              setDescriptionText("Lien non valide");
	              setDescriptionError(true);
	              setSubmitVisualState("invalid");
	            } else {
	              setDescriptionError(false);
	              setDescriptionText("Veuillez coller le lien Google Drive du dossier FACTURATION™ 3.0");
	              setSubmitVisualState("ready");
	            }
	          })
	          .withFailureHandler(() => {
	            if (token !== lastValidationToken) return;
	            lastValidFolderId = "";
	            setInputInvalid(true);
	            setDescriptionText("Lien non valide");
	            setDescriptionError(true);
	            setSubmitVisualState("invalid");
	          })
	          .validateSystemRootFolderInput(trimmed);
	      }

	      function scheduleValidation() {
	        const trimmed = String(getInputEl().value || "").trim();
	        if (!trimmed) {
	          setSubmitVisualState("idle");
	        } else {
	          // Feedback immédiat: bouton visuellement vert + ". . ." pendant la validation.
	          setSubmitVisualState("validating");
	        }
	        if (validateTimer) {
	          window.clearTimeout(validateTimer);
	        }
	        validateTimer = window.setTimeout(() => {
	          validateTimer = null;
          validateNow();
        }, 200);
      }

      function onCancel() {
        // Arrête complètement le flux: pas d'appel serveur de reprise.
        google.script.host.close();
      }

	      function onSubmit() {
	        if (isSubmitting) return;
	        if (!lastValidFolderId) return;

	        setSubmittingState(true);
	        showSpinnerScreen();
	        const raw = getInputEl().value;

		        google.script.run
		          .withSuccessHandler((result) => {
		            if (result && result.success === false) {
		              lastValidFolderId = "";
		              setSubmittingState(false);
		              showNormalScreen();
		              setInputInvalid(true);
		              setDescriptionText("Lien non valide");
		              setDescriptionError(true);
		              return;
	            }
            google.script.host.close();
	          })
		          .withFailureHandler(() => {
		            lastValidFolderId = "";
		            setSubmittingState(false);
		            showNormalScreen();
		            setInputInvalid(true);
		            setDescriptionText("Lien non valide");
		            setDescriptionError(true);
		          })
		          .submitSystemRootFolderForm(String(raw || ""), resumeAction, resumePayload);
		      }

      document.addEventListener("DOMContentLoaded", () => {
        getInputEl().addEventListener("input", scheduleValidation);
        validateNow();
        getInputEl().focus();
      });
    </script>
  </body>
</html>
