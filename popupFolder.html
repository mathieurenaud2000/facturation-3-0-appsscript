<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dossier pour factures</title>
    <style>
      :root {
        --text-black: #000000;
        --text-gray: #666666;
        --border-red: #ff0000;
        --footer-height: 78px;
        --footer-padding-top: 24px;
        --footer-padding-bottom: 4px;
        --footer-gap: 24px;
        --btn-height: 50px;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Roboto, Arial, sans-serif;
        color: var(--text-black);
        background: #ffffff;
      }

      .dialog {
        height: 100%;
        display: grid;
        grid-template-rows: 1fr var(--footer-height);
      }

      .content {
        padding: 0 0;
        display: grid;
        align-content: start;
        justify-items: center;
        overflow: auto;
      }

      .standard-alert-content {
        width: 100%;
        max-width: 720px;
        padding-top: 60px;
        display: grid;
        justify-items: center;
        text-align: center;
      }

      .standard-alert-icon {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }

      .standard-alert-title {
        margin-top: 25px;
        font-size: 24pt;
        font-weight: 700;
        color: var(--text-black);
      }

      .standard-alert-text {
        margin-top: 12px;
        font-size: 18pt;
        font-weight: 400;
        color: var(--text-gray);
        max-width: 680px;
      }

      .field-row {
        margin-top: 25px;
        width: 50%;
        min-width: 360px;
        display: grid;
      }

      .field-input {
        height: 35px;
        box-sizing: border-box;
        padding-left: 10px;
        padding-right: 10px;
        border-radius: 3px;
        border: 1px solid #000000;
        font-size: 13pt;
        font-weight: 400;
        outline: none;
      }

      .field-input.invalid {
        border-color: var(--border-red);
      }

      .footer {
        height: var(--footer-height);
        padding: var(--footer-padding-top) 0 var(--footer-padding-bottom) 0;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--footer-gap);
        align-items: stretch;
      }

      .btn {
        height: var(--btn-height);
        width: 100%;
        border-radius: 10px;
        border: 1px solid #000000;
        font-size: 16pt;
        cursor: pointer;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .btn-white {
        background: #ffffff;
        color: #000000;
      }

      .btn-green {
        background: #00983a;
        border-color: #00983a;
        color: #ffffff;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="dialog">
      <main class="content">
        <div class="standard-alert-content">
          <img
            class="standard-alert-icon"
            alt=""
            src="https://drive.google.com/thumbnail?id=10AJYlemE64c5MbMRbXWaz1vU3RtTrvpf&sz=w300"
          />
          <div class="standard-alert-title">Dossier pour factures</div>
          <div class="standard-alert-text">
            Lien du dossier dans lequel seront enregistrées les factures.
          </div>

          <div class="field-row">
            <input
              id="driveFolderInput"
              class="field-input"
              type="text"
              value=""
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
      </main>

      <footer class="footer" aria-label="Actions">
        <button id="cancel" class="btn btn-white" type="button" onclick="onCancel()">
          Annuler
        </button>
        <button id="submit" class="btn btn-green" type="button" onclick="onSubmit()" disabled>
          Enregistrer
        </button>
      </footer>
    </div>

    <script>
      const initialInvoiceNumber = <?!= JSON.stringify(typeof initialInvoiceNumber === "undefined" ? null : initialInvoiceNumber) ?>;

      let lastValidationToken = 0;
      let lastValidFolderId = "";
      let isSubmitting = false;
      let validateTimer = null;

      function getInputEl() {
        return document.getElementById("driveFolderInput");
      }

      function setSubmitDisabled(disabled) {
        const submit = document.getElementById("submit");
        submit.disabled = disabled;
      }

      function setInputInvalid(isInvalid) {
        getInputEl().classList.toggle("invalid", Boolean(isInvalid));
      }

      function setSubmittingState(submitting) {
        isSubmitting = submitting;
        document.getElementById("cancel").disabled = submitting;
        setSubmitDisabled(submitting || !lastValidFolderId);
      }

      function validateNow() {
        const raw = getInputEl().value;
        const trimmed = String(raw || "").trim();
        lastValidFolderId = "";
        setSubmitDisabled(true);

        if (!trimmed) {
          setInputInvalid(false);
          return;
        }

        const token = ++lastValidationToken;
        google.script.run
          .withSuccessHandler((result) => {
            if (token !== lastValidationToken) return;
            const isValid = Boolean(result && result.success);
            const folderId = String(result && result.folderId || "");
            lastValidFolderId = isValid ? folderId : "";
            setInputInvalid(!isValid);
            if (!isSubmitting) {
              setSubmitDisabled(!isValid);
            }
          })
          .withFailureHandler(() => {
            if (token !== lastValidationToken) return;
            lastValidFolderId = "";
            setInputInvalid(true);
            if (!isSubmitting) {
              setSubmitDisabled(true);
            }
          })
          .validateDriveFolderInput(trimmed);
      }

      function scheduleValidation() {
        if (validateTimer) {
          window.clearTimeout(validateTimer);
        }
        validateTimer = window.setTimeout(() => {
          validateTimer = null;
          validateNow();
        }, 200);
      }

      function onCancel() {
        // Arrête complètement le flux: pas d'appel serveur de reprise.
        google.script.host.close();
      }

      function onSubmit() {
        if (isSubmitting) return;
        if (!lastValidFolderId) return;

        setSubmittingState(true);
        const raw = getInputEl().value;

        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success === false) {
              // Validation serveur échouée (ex: ID devenu invalide).
              setSubmittingState(false);
              lastValidFolderId = "";
              setInputInvalid(true);
              return;
            }
            google.script.host.close();
          })
          .withFailureHandler(() => {
            setSubmittingState(false);
            setInputInvalid(true);
          })
          .submitDriveFolderForm(String(raw || ""), initialInvoiceNumber);
      }

      document.addEventListener("DOMContentLoaded", () => {
        getInputEl().addEventListener("input", scheduleValidation);
        validateNow();
        getInputEl().focus();
      });
    </script>
  </body>
</html>
