<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .message {
      font-size: 16px;
      margin-bottom: 20px;
      color: #000;
    }

    .label {
      margin-bottom: 6px;
      font-size: 10pt;
      color: #888;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      font-size: 13pt;
      color: #000;
    }

    input.invalid {
      border: 1px solid #ff0000;
    }

    .error-message {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #ff0000;
      color: #b00020;
      background-color: #fff4f4;
      font-size: 11pt;
    }

    .error-message.active {
      display: block;
    }

    .footer {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      padding-top: 20px;
    }

    .btn {
      padding: 12px 40px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: 1px solid #4CAF50;
    }

    .btn:hover {
      background-color: #45a049;
      border: 1px solid #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="message">Par quel numéro de facture doit-on commencer?</div>

    <div>
      <div class="label">Numéro</div>
      <input type="number" id="number" inputmode="numeric" min="1" step="1">
    </div>

    <div id="errorMessage" class="error-message" aria-live="polite"></div>

    <div class="footer">
      <button class="btn" onclick="submitForm()">OK</button>
    </div>
  </div>

  <script>
    function showError(message) {
      const errorMessage = document.getElementById("errorMessage");
      errorMessage.textContent = message;
      errorMessage.classList.add("active");
    }

    function clearError() {
      const errorMessage = document.getElementById("errorMessage");
      errorMessage.textContent = "";
      errorMessage.classList.remove("active");
    }

    function validateForm() {
      const numberInput = document.getElementById("number");
      const isValid = /^\d+$/.test(numberInput.value.trim());
      numberInput.classList.toggle("invalid", !isValid);
      if (!isValid) {
        showError("Veuillez saisir un numéro valide.");
      } else {
        clearError();
      }
      return isValid;
    }

    function submitForm() {
      if (!validateForm()) return;

      const number = Number(document.getElementById("number").value.trim());

      clearError();
      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler(error => showError("Erreur : " + error.message))
        .openFacturerPopupFromInitialSetup(number);
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("number").focus();
    });
  </script>
</body>
</html>
