<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Roboto, sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .popup-view {
      display: none;
    }

    .popup-view.active {
      display: block;
    }

    .message {
      font-size: 16px;
      margin-bottom: 20px;
      color: #000;
    }

    .label {
      margin-bottom: 6px;
      font-size: 10pt;
      color: #888;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      font-size: 13pt;
      color: #000;
    }

    input.invalid {
      border: 1px solid #ff0000;
    }

    .footer {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      padding-top: 20px;
    }

    .btn {
      padding: 12px 40px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: 1px solid #4CAF50;
    }

    .btn:hover {
      background-color: #45a049;
      border: 1px solid #45a049;
    }

    .error-message {
      color: #b00020;
      font-size: 11pt;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formView" class="popup-view active">
      <div class="message">Par quel numéro de facture doit-on commencer?</div>

      <div>
        <div class="label">Numéro</div>
        <input type="number" id="number" inputmode="numeric" min="1" step="1">
      </div>

      <div class="footer">
        <button class="btn" onclick="submitForm()">OK</button>
      </div>
    </div>

    <div id="errorView" class="popup-view">
      <div id="errorMessage" class="error-message"></div>
    </div>
  </div>

  <script>
    const popupViewIds = ["formView", "errorView"];

    function setActiveView(viewId) {
      popupViewIds.forEach(id => {
        document.getElementById(id).classList.toggle("active", id === viewId);
      });
    }

    function showFormView() {
      setActiveView("formView");
      document.getElementById("number").focus();
    }

    function showErrorView(message) {
      document.getElementById("errorMessage").textContent = message;
      setActiveView("errorView");
    }

    function validateForm() {
      const numberInput = document.getElementById("number");
      const isValid = /^\d+$/.test(numberInput.value.trim());
      numberInput.classList.toggle("invalid", !isValid);
      if (!isValid) {
        showErrorView("Veuillez saisir un numéro valide.");
      }
      return isValid;
    }

    function submitForm() {
      if (!validateForm()) return;

      const number = Number(document.getElementById("number").value.trim());

      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler(error => showErrorView("Erreur : " + error.message))
        .openFacturerPopupFromInitialSetup(number);
    }

    document.addEventListener("DOMContentLoaded", () => {
      showFormView();
    });
  </script>
</body>
</html>
